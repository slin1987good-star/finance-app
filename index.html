<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>财务内账系统</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg-deep:#04080f;--bg:#0a1120;--surface:#111b2e;--surface-hover:#162035;--surface-alt:#1a2742;--border:#1e3050;--border-light:#264060;--text:#e8edf5;--text-dim:#8899b0;--text-muted:#506580;--accent:#00c9a7;--accent-dim:#00a88c;--accent-bg:rgba(0,201,167,.08);--accent-border:rgba(0,201,167,.2);--income:#00e5a0;--expense:#f0a030;--danger:#f05050;--purple:#a78bfa;--blue:#60a5fa;--radius:10px;--radius-sm:6px;--shadow:0 2px 16px rgba(0,0,0,.3);--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;overflow:hidden}
body{font-family:'Noto Sans SC',-apple-system,sans-serif;background:
radial-gradient(circle at top left,rgba(0,201,167,.08),transparent 26%),
linear-gradient(180deg,#08111f 0%,#0a1120 45%,#09101d 100%);
color:var(--text);font-size:13px;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
input,select,textarea,button{font-family:inherit}
.app{display:flex;height:100vh}
.sidebar{width:200px;min-width:200px;background:rgba(4,8,15,.94);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:transform .3s;z-index:100;backdrop-filter:blur(18px)}
.main{flex:1;overflow:auto;background:transparent}
.sidebar-logo{padding:22px 18px 16px;border-bottom:1px solid var(--border)}
.sidebar-logo h1{font-size:15px;font-weight:700;color:var(--accent);letter-spacing:2px;display:flex;align-items:center;gap:8px}
.sidebar-logo .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent)}
.sidebar-logo p{font-size:10px;color:var(--text-muted);margin-top:5px;letter-spacing:1px}
nav{flex:1;padding:12px 8px}
.nav-btn{display:flex;align-items:center;gap:10px;width:100%;padding:9px 14px;margin:1px 0;border:none;border-radius:var(--radius-sm);cursor:pointer;font-size:12px;font-family:inherit;background:transparent;color:var(--text-dim);transition:all .15s;letter-spacing:.5px;position:relative;overflow:hidden}
.nav-btn:hover{background:rgba(255,255,255,.03);color:var(--text)}
.nav-btn.active{background:var(--accent-bg);color:var(--accent);font-weight:600;border:1px solid var(--accent-border)}
.nav-btn.active::before{content:'';position:absolute;left:0;top:20%;height:60%;width:2px;background:var(--accent);border-radius:2px}
.nav-btn .ico{font-size:14px;width:20px;text-align:center}
.sidebar-bottom{padding:14px;border-top:1px solid var(--border)}
.sidebar-bottom label{font-size:10px;color:var(--text-muted);display:block;margin-bottom:5px;letter-spacing:1px;text-transform:uppercase}
.sidebar-bottom select{width:100%;padding:6px 8px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:11px}
.sidebar-status{padding:6px 14px 14px;font-size:10px;color:var(--text-muted);letter-spacing:.5px;display:flex;align-items:center;gap:5px}
.sidebar-status .pulse{width:5px;height:5px;border-radius:50%;background:var(--accent)}
.page{padding:24px;animation:fadeIn .25s}
.page-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;flex-wrap:wrap;gap:10px}
.page-head h1{font-size:20px;font-weight:600;letter-spacing:1px}
.page-head .meta{font-size:11px;color:var(--text-muted)}
.btn{padding:7px 14px;border-radius:var(--radius-sm);border:1px solid transparent;color:var(--text);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit;letter-spacing:.3px;display:inline-flex;align-items:center;gap:5px}
.btn-accent{background:var(--accent);color:var(--bg-deep);border-color:var(--accent);font-weight:600}
.btn-accent:hover{box-shadow:0 0 20px rgba(0,201,167,.25)}
.btn-surface{background:var(--surface-alt);border-color:var(--border)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text-dim)}
.btn-danger{background:transparent;color:var(--danger);border:1px solid rgba(240,80,80,.2)}
.btn-sm{padding:3px 8px;font-size:11px;border-radius:4px}
.card{background:linear-gradient(180deg,rgba(20,31,52,.92),rgba(15,24,40,.96));border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;transition:border-color .2s,transform .2s,box-shadow .2s;box-shadow:0 10px 30px rgba(2,8,20,.22)}
.card:hover{border-color:var(--border-light);transform:translateY(-1px)}
.card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:24px}
.stat-card{padding:18px;position:relative}
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:1px}
.stat-card.t-inc::after{background:linear-gradient(90deg,var(--income),transparent)}
.stat-card.t-exp::after{background:linear-gradient(90deg,var(--expense),transparent)}
.stat-card.t-bal::after{background:linear-gradient(90deg,var(--accent),transparent)}
.stat-card.t-cnt::after{background:linear-gradient(90deg,var(--purple),transparent)}
.stat-card.t-bin::after{background:linear-gradient(90deg,var(--blue),transparent)}
.stat-card.t-bout::after{background:linear-gradient(90deg,#f97316,transparent)}
.stat-card .sc-label{font-size:11px;color:var(--text-muted);margin-bottom:8px;letter-spacing:.5px}
.stat-card .sc-val{font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1.2}
.stat-card .sc-sub{font-size:10px;color:var(--text-muted);margin-top:6px}
.chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(380px,1fr));gap:16px;margin-bottom:16px}
.chart-box{padding:20px}
.chart-box h3{font-size:13px;font-weight:600;margin-bottom:14px;color:var(--text-dim);letter-spacing:.5px}
.filters-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:flex-start}
.filter-wrap{position:relative}
.filter-trigger{padding:6px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;min-width:90px;transition:border-color .15s;white-space:nowrap}
.filter-trigger:hover,.filter-trigger.open{border-color:var(--accent-border)}
.filter-trigger .arrow{font-size:8px;color:var(--text-muted);margin-left:auto}
.filter-trigger .badge{background:var(--accent);color:var(--bg-deep);font-size:9px;padding:1px 5px;border-radius:8px;font-weight:700;min-width:16px;text-align:center}
.filter-drop{position:absolute;top:calc(100% + 4px);left:0;min-width:200px;max-height:280px;overflow:auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);box-shadow:var(--shadow);z-index:50;display:none}
.filter-drop.show{display:block}
.fd-item{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;font-size:12px;color:var(--text-dim);transition:background .1s}
.fd-item:hover{background:var(--surface-hover)}
.fd-item.checked{color:var(--accent)}
.fd-item .ck{width:14px;height:14px;border:1.5px solid var(--border-light);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;transition:all .15s}
.fd-item.checked .ck{background:var(--accent);border-color:var(--accent);color:var(--bg-deep)}
.fd-group{font-size:10px;color:var(--text-muted);padding:8px 12px 4px;letter-spacing:1px;text-transform:uppercase;border-top:1px solid var(--border)}
.fd-group:first-child{border-top:none}
.filter-input{padding:6px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:12px;transition:border-color .15s}
.filter-input:focus{outline:none;border-color:var(--accent-border)}
.summary-bar{display:flex;gap:20px;margin-bottom:10px;font-size:12px;color:var(--text-dim);padding:8px 12px;background:var(--surface);border-radius:var(--radius-sm);border:1px solid var(--border);flex-wrap:wrap}
.summary-bar b{font-weight:600}
.table-wrap{flex:1;overflow:auto;border-radius:var(--radius);border:1px solid var(--border);background:rgba(17,27,46,.92);-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:1050px}
thead{position:sticky;top:0;z-index:2}
thead th{padding:10px 8px;text-align:left;font-size:11px;font-weight:600;color:var(--text-muted);white-space:nowrap;background:var(--surface-alt);border-bottom:1px solid var(--border);letter-spacing:.5px}
tbody td{padding:7px 8px;font-size:12px;white-space:nowrap;border-bottom:1px solid rgba(30,48,80,.5)}
tbody tr{transition:background .1s}
tbody tr:hover{background:var(--surface-hover)}
.t-mono{font-family:'JetBrains Mono',monospace;font-size:11px}
.t-inc{color:var(--income);text-align:right}
.t-exp{color:var(--expense);text-align:right}
.t-trunc{max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tag{padding:2px 7px;border-radius:3px;font-size:10px;font-weight:600;letter-spacing:.5px}
.tag-c{background:rgba(0,229,160,.1);color:var(--income)}
.tag-d{background:rgba(96,165,250,.1);color:var(--blue)}
.tag-o{background:rgba(167,139,250,.1);color:var(--purple)}
.t-btn{padding:2px 6px;font-size:11px;border-radius:3px;border:none;cursor:pointer;background:transparent;font-family:inherit;transition:all .1s}
.t-btn:hover{background:var(--surface-alt)}
tr.editing{background:var(--accent-bg)!important}
.edit-input{padding:3px 5px;border-radius:4px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:11px;font-family:inherit}
.pagination{display:flex;justify-content:center;align-items:center;gap:6px;margin-top:14px}
.pagination span{font-size:11px;color:var(--text-muted)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:1000;animation:fadeIn .15s;backdrop-filter:blur(4px)}
.modal-bg.hidden{display:none}
.modal{background:linear-gradient(180deg,rgba(20,31,52,.98),rgba(13,22,37,.98));border-radius:var(--radius);padding:24px;width:92%;max-width:520px;max-height:85vh;overflow:auto;border:1px solid var(--border);box-shadow:var(--shadow);animation:slideUp .2s}
.modal h2{font-size:16px;font-weight:600;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center}
.modal h2 button{background:none;border:none;color:var(--text-muted);font-size:18px;cursor:pointer}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-grid .full{grid-column:1/-1}
.f-label{font-size:11px;color:var(--text-muted);margin-bottom:4px;letter-spacing:.3px}
.f-input{width:100%;padding:7px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:12px}
.f-input:focus{outline:none;border-color:var(--accent-border)}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}
.proj-select{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.proj-tab{padding:8px 18px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text-dim);font-size:12px;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s;letter-spacing:.5px}
.proj-tab:hover{border-color:var(--border-light)}
.proj-tab.active{background:var(--accent-bg);color:var(--accent);border-color:var(--accent-border);font-weight:600}
.proj-card{padding:24px}
.proj-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px;flex-wrap:wrap;gap:14px}
.proj-name{font-size:18px;font-weight:700;display:flex;align-items:center;gap:10px}
.proj-name .dot{width:10px;height:10px;border-radius:3px;display:inline-block}
.proj-stats{display:flex;gap:20px;flex-wrap:wrap}
.proj-stat{text-align:right}
.ps-label{font-size:10px;color:var(--text-muted);letter-spacing:.5px}
.ps-val{font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace;margin-top:2px}
.proj-content{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:18px}
.proj-section h4{font-size:12px;font-weight:500;color:var(--text-muted);margin-bottom:10px;letter-spacing:.5px}
.mini-table{width:100%;border-collapse:collapse}
.mini-table th{padding:5px 8px;text-align:left;font-size:10px;color:var(--text-muted);border-bottom:1px solid var(--border);letter-spacing:.5px}
.mini-table td{padding:5px 8px;font-size:11px;border-bottom:1px solid rgba(30,48,80,.4)}
.s-card{max-width:660px;padding:22px;margin-bottom:16px}
.s-card h3{font-size:14px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.s-card .desc{font-size:12px;color:var(--text-dim);line-height:1.8}
.s-table td{padding:5px 8px;font-size:12px;border-bottom:1px solid rgba(30,48,80,.4)}
.perm-row{display:flex;gap:12px;align-items:flex-start;padding:10px;border-radius:var(--radius-sm);background:var(--bg);margin-bottom:6px}
.perm-badge{min-width:52px;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;text-align:center;letter-spacing:.5px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--accent);color:var(--bg-deep);padding:8px 22px;border-radius:999px;z-index:9999;font-size:13px;font-weight:600;box-shadow:0 4px 24px rgba(0,201,167,.3);animation:slideDown .25s;letter-spacing:.3px}
.toast.hidden{display:none}
.empty{text-align:center;padding:60px 20px;color:var(--text-muted)}
.empty .eico{font-size:36px;margin-bottom:12px;opacity:.5}
.mobile-menu{display:none;position:fixed;top:calc(var(--safe-top) + 12px);left:12px;z-index:101;background:rgba(17,27,46,.88);border:1px solid rgba(255,255,255,.06);color:var(--text);padding:10px 12px;border-radius:14px;cursor:pointer;font-size:18px;line-height:1;backdrop-filter:blur(14px);box-shadow:0 10px 28px rgba(0,0,0,.25)}
.sidebar-backdrop{display:none}
@media(max-width:768px){
  body{font-size:14px}
  .sidebar-backdrop{display:block;position:fixed;inset:0;background:rgba(3,8,16,.55);backdrop-filter:blur(2px);z-index:99;opacity:0;pointer-events:none;transition:opacity .25s}
  .sidebar-backdrop.show{opacity:1;pointer-events:auto}
  .sidebar{position:fixed;top:0;left:0;height:100%;width:min(82vw,300px);min-width:min(82vw,300px);transform:translateX(-100%);box-shadow:18px 0 36px rgba(0,0,0,.32);padding-top:var(--safe-top);padding-bottom:var(--safe-bottom)}
  .sidebar.open{transform:translateX(0)!important}
  .mobile-menu{display:block}
  .main{padding-top:calc(var(--safe-top) + 8px);padding-bottom:var(--safe-bottom)}
  .page{padding:72px 14px 18px}
  .page-head{align-items:flex-start;margin-bottom:18px;gap:12px}
  .page-head h1{font-size:22px;line-height:1.2}
  .page-head .meta{font-size:12px}
  .page-actions{width:100%;display:grid!important;grid-template-columns:1fr 1fr;gap:10px}
  .page-actions .btn{justify-content:center}
  .btn{min-height:42px;padding:10px 14px;font-size:13px;border-radius:10px}
  .btn-sm{min-height:auto;padding:7px 10px}
  .card-grid,.chart-grid,.proj-content,.modal-grid{grid-template-columns:1fr}
  .card-grid{gap:12px}
  .chart-box{padding:16px}
  .chart-box h3{font-size:14px;margin-bottom:12px}
  .stat-card{padding:16px}
  .stat-card .sc-label{font-size:12px;line-height:1.5}
  .stat-card .sc-val{font-size:22px}
  .filters-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .filters-row .filter-wrap,.filters-row .filter-input,.filters-row>.btn{width:100%!important}
  .filters-row .filter-trigger{width:100%;min-height:42px;padding:10px 12px;border-radius:10px}
  .filters-row .filter-input{min-height:42px;font-size:13px}
  .filters-row input[placeholder]{grid-column:1/-1}
  .filters-row>.btn:last-child{grid-column:1/-1}
  .filter-drop{left:0;right:auto;top:calc(100% + 6px);min-width:100%;max-width:min(84vw,320px);max-height:min(48vh,360px);margin-top:0;border-radius:12px}
  .summary-bar{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px}
  .summary-bar span{padding:8px 10px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.03);border-radius:10px}
  .table-wrap{margin:0 -2px;border-radius:14px}
  table{min-width:920px}
  thead th{padding:12px 8px;font-size:10px}
  tbody td{padding:10px 8px}
  .pagination{flex-wrap:wrap;gap:8px}
  .proj-select{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .proj-tab{width:100%;padding:10px 12px;border-radius:10px;font-size:13px}
  .proj-card{padding:16px}
  .proj-head{gap:16px}
  .proj-name{font-size:20px}
  .proj-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%}
  .proj-stat{text-align:left;padding:12px;border-radius:12px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04)}
  .ps-label{font-size:11px}
  .ps-val{font-size:16px}
  .s-card{padding:16px}
  .perm-row{padding:12px}
  .modal{width:min(94vw,520px);padding:18px 16px 16px;border-radius:16px;max-height:calc(100vh - 32px - var(--safe-top) - var(--safe-bottom))}
  .modal-actions{flex-direction:column-reverse}
  .modal-actions .btn{width:100%;justify-content:center}
  .toast{top:calc(var(--safe-top) + 12px);width:calc(100vw - 32px);text-align:center}
}
@media(max-width:480px){
  .page{padding-left:12px;padding-right:12px}
  .card-grid{grid-template-columns:1fr}
  .filters-row,.summary-bar,.proj-select,.proj-stats{grid-template-columns:1fr}
  .page-actions{grid-template-columns:1fr}
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.hidden{display:none!important}
.sync-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;vertical-align:middle;flex-shrink:0}
.sync-dot.idle{background:var(--accent)}
.sync-dot.syncing{background:var(--blue);animation:syncPulse .8s infinite alternate}
.sync-dot.error{background:var(--danger)}
.sync-dot.offline{background:var(--text-muted)}
@keyframes syncPulse{from{opacity:.3}to{opacity:1}}
.cloud-row{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.cloud-row .f-label{font-size:11px;color:var(--text-muted);min-width:72px;flex-shrink:0;letter-spacing:.3px}
.cloud-input{flex:1;padding:6px 9px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:12px;min-width:0;font-family:inherit}
.cloud-input:focus{outline:none;border-color:var(--accent-border)}
</style>
</head>
<body>
<div class="app">
  <button class="mobile-menu" onclick="toggleSidebar()">☰</button>
  <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="closeSidebar()"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-logo"><h1><span class="dot"></span>财务内账</h1><p>FINANCE MANAGEMENT</p></div>
    <nav id="nav"></nav>
    <div class="sidebar-bottom"><label>角色</label><select id="roleSelect" onchange="G.role=this.value;render()"><option value="admin">管理者</option><option value="editor">编辑者</option><option value="viewer">查看者</option></select></div>
    <div class="sidebar-status" id="statusBar"><span class="sync-dot idle" id="syncDot"></span><span id="statusText">0 条</span></div>
  </div>
  <div class="main" id="main"></div>
</div>
<div class="modal-bg hidden" id="modalBg" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()" id="modalBox"></div></div>
<div class="toast hidden" id="toast"></div>

<script>
const G={records:[],page:'dashboard',role:'admin',filters:{projects:[],categories:[],banks:[],dateFrom:'',dateTo:'',search:''},listPage:1,editingId:null,selectedProject:null,charts:{}};
const PAGE_SIZE=20,ROLES={admin:'管理者',editor:'编辑者',viewer:'查看者'};
const COLORS=['#00e5a0','#60a5fa','#f0a030','#f05050','#a78bfa','#ec4899','#14b8a6','#f97316','#6366f1','#e879f9'];
const CC={'收入-工程款':'#00e5a0','收入-其他':'#6ee7b7','支出-材料费':'#f0a030','支出-劳务费':'#fb923c','支出-管理费':'#f97316','支出-税金':'#f05050','支出-其他费':'#f87171','支出-利润提取':'#e11d48','借款':'#a78bfa','往来-借款':'#34d399','往来-备用金':'#6366f1','退回备用金':'#818cf8','退回劳务款':'#c084fc','退回材料款':'#d8b4fe'};
const INCOME_CATS=['收入-工程款','收入-其他'];
const EXPENSE_CATS=['支出-材料费','支出-劳务费','支出-管理费','支出-税金','支出-其他费','支出-利润提取','借款','往来-借款','往来-备用金'];
const RETURN_CATS=['退回备用金','退回劳务款','退回材料款'];

const $=id=>document.getElementById(id);
const fmt=n=>n!=null?n.toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2}):'0.00';
const fmtW=n=>{const a=Math.abs(n);return a>=1e8?(n/1e8).toFixed(2)+'亿':a>=1e4?(n/1e4).toFixed(2)+'万':fmt(n)};
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function toast(m){const t=$('toast');t.textContent=m;t.classList.remove('hidden');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.add('hidden'),2500)}

// ═══ Storage & Cloud Sync ════════════════════════════════════════════════════
const SK='fin_v3';
const CLOUD_CFG_KEY='fin_cloud_cfg';
const Sync={status:'idle',lastSyncAt:null,saveTimer:null,DEBOUNCE_MS:1500};

function getCloudCfg(){try{const r=localStorage.getItem(CLOUD_CFG_KEY);return r?JSON.parse(r):{endpoint:'',token:''}}catch(e){return{endpoint:'',token:''}}}
function saveCloudCfg(cfg){localStorage.setItem(CLOUD_CFG_KEY,JSON.stringify(cfg))}

function setSyncStatus(status,msg){Sync.status=status;const dot=document.getElementById('syncDot'),txt=document.getElementById('statusText');if(!dot||!txt)return;dot.className='sync-dot '+status;const base=G.records.length+' 条';txt.textContent=msg?base+' · '+msg:base}

function _serialize(){return JSON.stringify(G.records.map(r=>[r.id,r.date,r.bank,r.counterparty,r.income,r.expense,r.project,r.category,r.description,r.remark,r.feishuId,r.editLog||[]]))}
function _deserialize(s){return JSON.parse(s).map(a=>({id:a[0],date:a[1],bank:a[2],counterparty:a[3],income:a[4]||0,expense:a[5]||0,project:a[6]||'',category:a[7]||'',description:a[8]||'',remark:a[9]||'',feishuId:a[10]||'',editLog:a[11]||[]}))}

function _saveLocal(){try{const c=_serialize(),cs=2e6,n=Math.ceil(c.length/cs);localStorage.setItem(SK+'_m',JSON.stringify({n}));for(let i=0;i<n;i++)localStorage.setItem(SK+'_'+i,c.slice(i*cs,(i+1)*cs));for(let i=n;i<n+10;i++)localStorage.removeItem(SK+'_'+i)}catch(e){console.warn('localStorage write failed',e)}}
function _loadLocal(){try{const m=localStorage.getItem(SK+'_m');if(!m)return[];const{n}=JSON.parse(m);let s='';for(let i=0;i<n;i++)s+=localStorage.getItem(SK+'_'+i)||'';return _deserialize(s)}catch(e){return[]}}

async function _cloudGet(){const cfg=getCloudCfg();if(!cfg.endpoint||!cfg.token)return null;const r=await fetch(cfg.endpoint.replace(/\/$/,'')+'/records',{headers:{'Authorization':'Bearer '+cfg.token},signal:AbortSignal.timeout(15000)});if(!r.ok)throw new Error('HTTP '+r.status);return await r.json()}
async function _cloudPut(payload){const cfg=getCloudCfg();if(!cfg.endpoint||!cfg.token)return false;const r=await fetch(cfg.endpoint.replace(/\/$/,'')+'/records',{method:'POST',headers:{'Authorization':'Bearer '+cfg.token,'Content-Type':'application/json'},body:payload,signal:AbortSignal.timeout(20000)});if(!r.ok)throw new Error('HTTP '+r.status);return true}

function save(){
  _saveLocal();
  clearTimeout(Sync.saveTimer);
  const cfg=getCloudCfg();if(!cfg.endpoint||!cfg.token)return;
  setSyncStatus('syncing','待同步...');
  Sync.saveTimer=setTimeout(async()=>{
    try{setSyncStatus('syncing','同步中...');await _cloudPut(_serialize());Sync.lastSyncAt=new Date();setSyncStatus('idle','已同步 '+Sync.lastSyncAt.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}))}
    catch(e){console.warn('Cloud save failed:',e);setSyncStatus('error','同步失败')}
  },Sync.DEBOUNCE_MS)
}

async function load(){
  const cfg=getCloudCfg();
  if(!cfg.endpoint||!cfg.token)return _loadLocal();
  setSyncStatus('syncing','云端加载中...');
  try{
    const data=await _cloudGet();
    if(!data||data.length===0){const local=_loadLocal();if(local.length>0){setSyncStatus('offline','云端无数据，使用本地');return local}setSyncStatus('idle','');return[]}
    const records=_deserialize(JSON.stringify(data));G.records=records;_saveLocal();setSyncStatus('idle','云端已加载');return records
  }catch(e){console.warn('Cloud load failed, using localStorage:',e);setSyncStatus('offline','离线模式');return _loadLocal()}
}

async function syncNow(){
  const cfg=getCloudCfg();if(!cfg.endpoint||!cfg.token){toast('请先配置云端设置');return}
  setSyncStatus('syncing','同步中...');
  try{await _cloudPut(_serialize());Sync.lastSyncAt=new Date();setSyncStatus('idle','已同步 '+Sync.lastSyncAt.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}));toast('同步成功')}
  catch(e){setSyncStatus('error','同步失败');toast('同步失败: '+e.message)}
}

async function loadFromCloud(){
  if(!confirm('从云端恢复将覆盖本地数据，确认吗？'))return;
  const cfg=getCloudCfg();if(!cfg.endpoint||!cfg.token){toast('请先配置云端设置');return}
  setSyncStatus('syncing','云端恢复中...');
  try{const data=await _cloudGet();if(!data||data.length===0){toast('云端暂无数据');setSyncStatus('idle','');return}G.records=_deserialize(JSON.stringify(data));_saveLocal();setSyncStatus('idle','云端已恢复');render();toast('已从云端恢复 '+G.records.length+' 条')}
  catch(e){setSyncStatus('error','恢复失败');toast('恢复失败: '+e.message)}
}

function getFiltered(){return G.records.filter(r=>{if(G.filters.projects.length&&!G.filters.projects.includes(r.project))return false;if(G.filters.categories.length&&!G.filters.categories.includes(r.category))return false;if(G.filters.banks.length&&!G.filters.banks.includes(r.bank))return false;if(G.filters.dateFrom&&r.date<G.filters.dateFrom)return false;if(G.filters.dateTo&&r.date>G.filters.dateTo)return false;if(G.filters.search){const s=G.filters.search.toLowerCase();return(r.counterparty+r.description+r.remark+r.feishuId).toLowerCase().includes(s)}return true})}
function uniq(k){return[...new Set(G.records.map(r=>r[k]).filter(Boolean))].sort()}

function getStats(recs){
  const all=recs||G.records;let rawInc=0,rawExp=0,borrowIn=0,borrowOut=0,retLabor=0,retMat=0,retOther=0;
  const monthly={},byProj={},catInc={},catExp={};
  all.forEach(r=>{
    if(r.category==='往来-借款')borrowIn+=r.income;
    else if(r.category==='借款')borrowOut+=r.expense;
    if(r.category==='退回劳务款')retLabor+=r.income;
    if(r.category==='退回材料款')retMat+=r.income;
    if(r.category==='退回备用金')retOther+=r.income;
    rawInc+=r.income;rawExp+=r.expense;
    const m=r.date.slice(0,7);if(!monthly[m])monthly[m]={month:m,income:0,expense:0};monthly[m].income+=r.income;monthly[m].expense+=r.expense;
    const p=r.project||'未分类';if(!byProj[p])byProj[p]={name:p,income:0,expense:0,count:0};byProj[p].income+=r.income;byProj[p].expense+=r.expense;byProj[p].count++;
    if(r.income>0&&r.category){if(!catInc[r.category])catInc[r.category]={name:r.category,amount:0,count:0};catInc[r.category].amount+=r.income;catInc[r.category].count++}
    if(r.expense>0&&r.category){if(!catExp[r.category])catExp[r.category]={name:r.category,amount:0,count:0};catExp[r.category].amount+=r.expense;catExp[r.category].count++}
  });
  const totalInc=rawInc-borrowIn-(retLabor+retMat+retOther);
  const totalExp=rawExp-borrowOut;
  const mArr=Object.values(monthly).sort((a,b)=>a.month.localeCompare(b.month));
  let bal=0;mArr.forEach(m=>{bal+=m.income-m.expense;m.balance=bal});
  return{rawInc,rawExp,totalInc,totalExp,balance:totalInc-totalExp,borrowIn,borrowOut,borrowNet:borrowIn-borrowOut,retLabor,retMat,retOther,mArr,byProj:Object.values(byProj),catInc:Object.values(catInc).sort((a,b)=>b.amount-a.amount),catExp:Object.values(catExp).sort((a,b)=>b.amount-a.amount),total:all.length}
}

const PAGES=[{key:'dashboard',ico:'◈',label:'统计概览'},{key:'ledger',ico:'☰',label:'流水明细'},{key:'projects',ico:'◫',label:'项目分析'},{key:'settings',ico:'⚙',label:'系统设置'}];
function renderNav(){$('nav').innerHTML=PAGES.map(p=>`<button class="nav-btn ${G.page===p.key?'active':''}" onclick="go('${p.key}')"><span class="ico">${p.ico}</span>${p.label}</button>`).join('')}
function openSidebar(){$('sidebar').classList.add('open');$('sidebarBackdrop').classList.add('show')}
function closeSidebar(){$('sidebar').classList.remove('open');$('sidebarBackdrop').classList.remove('show')}
function toggleSidebar(){$('sidebar').classList.contains('open')?closeSidebar():openSidebar()}
function go(p){G.page=p;G.editingId=null;G.listPage=1;closeAllDrops();renderNav();render();closeSidebar()}

function closeAllDrops(){document.querySelectorAll('.filter-drop').forEach(d=>d.classList.remove('show'));document.querySelectorAll('.filter-trigger').forEach(t=>t.classList.remove('open'))}
function toggleDrop(id,ev){ev.stopPropagation();const d=document.querySelector(`[data-drop="${id}"]`);const t=ev.currentTarget;if(d.classList.contains('show')){d.classList.remove('show');t.classList.remove('open')}else{closeAllDrops();d.classList.add('show');t.classList.add('open')}}
function toggleFI(fk,val){const a=G.filters[fk];const i=a.indexOf(val);if(i>=0)a.splice(i,1);else a.push(val);G.listPage=1;render()}
function clearFilters(){G.filters={projects:[],categories:[],banks:[],dateFrom:'',dateTo:'',search:''};G.listPage=1;render()}
document.addEventListener('click',()=>closeAllDrops());
window.addEventListener('resize',()=>{if(window.innerWidth>768)closeSidebar()});

function mkChart(cid,type,data,opts={}){if(G.charts[cid])G.charts[cid].destroy();const el=document.getElementById(cid);if(!el)return;const isDo=type==='doughnut';G.charts[cid]=new Chart(el.getContext('2d'),{type,data,options:{responsive:true,maintainAspectRatio:false,...opts,plugins:{legend:{labels:{color:'#506580',font:{size:10,family:"'Noto Sans SC'"},padding:12},...(opts.plugins?.legend||{})},tooltip:{backgroundColor:'#111b2e',borderColor:'#1e3050',borderWidth:1,titleFont:{family:"'Noto Sans SC'",size:11},bodyFont:{family:"'JetBrains Mono'",size:11},padding:10,callbacks:isDo?{label:c=>`${c.label}: ¥${fmt(c.raw)}`}:{label:c=>`${c.dataset.label}: ¥${fmt(c.raw)}`}},...(opts.plugins?.title?{title:opts.plugins.title}:{})},scales:isDo?{}:{x:{ticks:{color:'#506580',font:{size:9}},grid:{color:'rgba(30,48,80,.4)'},border:{color:'rgba(30,48,80,.4)'},...(opts.scales?.x||{})},y:{ticks:{color:'#506580',font:{size:9},callback:v=>fmtW(v)},grid:{color:'rgba(30,48,80,.4)'},border:{color:'rgba(30,48,80,.4)'},...(opts.scales?.y||{})}}}})}

function render(){setSyncStatus(Sync.status);({dashboard:rDash,ledger:rLedger,projects:rProjects,settings:rSettings})[G.page]()}

function rDash(){
  if(!G.records.length){$('main').innerHTML=`<div class="page"><div class="page-head"><h1>统计概览</h1></div><div class="empty"><div class="eico">◇</div><div style="font-size:14px;margin-bottom:6px">暂无数据</div><div style="font-size:12px">请在"系统设置"中导入Excel</div></div></div>`;return}
  const s=getStats();const dr=`${G.records[0].date} — ${G.records[G.records.length-1].date}`;
  let h=`<div class="page"><div class="page-head"><h1>统计概览</h1><div class="meta">${dr}</div></div>
  <div class="card-grid">
    <div class="card stat-card t-inc"><div class="sc-label">经营收入（扣借款/退款）</div><div class="sc-val" style="color:var(--income)">¥${fmtW(s.totalInc)}</div><div class="sc-sub">原始收入 ¥${fmtW(s.rawInc)}</div></div>
    <div class="card stat-card t-exp"><div class="sc-label">经营支出（扣借款）</div><div class="sc-val" style="color:var(--expense)">¥${fmtW(s.totalExp)}</div><div class="sc-sub">原始支出 ¥${fmtW(s.rawExp)}</div></div>
    <div class="card stat-card t-bal"><div class="sc-label">经营净余额</div><div class="sc-val" style="color:${s.balance>=0?'var(--income)':'var(--danger)'}">¥${fmtW(s.balance)}</div></div>
    <div class="card stat-card t-bin"><div class="sc-label">借入资金</div><div class="sc-val" style="color:var(--blue)">¥${fmtW(s.borrowIn)}</div><div class="sc-sub">净借款 ¥${fmtW(s.borrowNet)}</div></div>
    <div class="card stat-card t-bout"><div class="sc-label">归还借款</div><div class="sc-val" style="color:#f97316">¥${fmtW(s.borrowOut)}</div></div>
    <div class="card stat-card t-cnt"><div class="sc-label">总记录</div><div class="sc-val" style="color:var(--purple)">${s.total}</div><div class="sc-sub">${s.mArr.length} 个月</div></div>
  </div>
  <div class="chart-grid"><div class="card chart-box"><h3>月度收支趋势</h3><div style="height:250px"><canvas id="c1"></canvas></div></div><div class="card chart-box"><h3>累计余额走势</h3><div style="height:250px"><canvas id="c2"></canvas></div></div></div>
  <div class="chart-grid"><div class="card chart-box"><h3>工程项目收支对比</h3><div style="height:250px"><canvas id="c3"></canvas></div></div><div class="card chart-box"><h3>借款收支分析</h3><div style="height:250px"><canvas id="c4"></canvas></div></div></div>

  $('main').innerHTML=h;

// ═══ LEDGER ═══
function rLedger(){
  const ce=G.role!=='viewer',cd=G.role==='admin';
  const ps=uniq('project'),cs=uniq('category'),bs=uniq('bank');
  const incC=cs.filter(c=>INCOME_CATS.includes(c)),expC=cs.filter(c=>EXPENSE_CATS.includes(c)),retC=cs.filter(c=>RETURN_CATS.includes(c)),othC=cs.filter(c=>!INCOME_CATS.includes(c)&&!EXPENSE_CATS.includes(c)&&!RETURN_CATS.includes(c));
  const filtered=getFiltered();filtered.sort((a,b)=>b.date.localeCompare(a.date)||a.id-b.id);
  const fI=filtered.reduce((s,r)=>s+r.income,0),fE=filtered.reduce((s,r)=>s+r.expense,0);
  const tp=Math.max(1,Math.ceil(filtered.length/PAGE_SIZE));if(G.listPage>tp)G.listPage=tp;
  const pg=filtered.slice((G.listPage-1)*PAGE_SIZE,G.listPage*PAGE_SIZE);
  const hf=G.filters.projects.length||G.filters.categories.length||G.filters.banks.length||G.filters.dateFrom||G.filters.dateTo||G.filters.search;

  function mDrop(id,label,fk,items,groups){
    const sel=G.filters[fk],cnt=sel.length;let dh='';
    if(groups){groups.forEach(g=>{if(!g.items.length)return;dh+=`<div class="fd-group">${g.label}</div>`;g.items.forEach(v=>{const ck=sel.includes(v);dh+=`<div class="fd-item ${ck?'checked':''}" onclick="event.stopPropagation();toggleFI('${fk}','${esc(v)}')"><span class="ck">${ck?'✓':''}</span>${esc(v)}</div>`})})}
    else{items.forEach(v=>{const ck=sel.includes(v);dh+=`<div class="fd-item ${ck?'checked':''}" onclick="event.stopPropagation();toggleFI('${fk}','${esc(v)}')"><span class="ck">${ck?'✓':''}</span>${esc(v)}</div>`})}
    return`<div class="filter-wrap"><div class="filter-trigger" onclick="toggleDrop('${id}',event)">${label}${cnt?` <span class="badge">${cnt}</span>`:''}<span class="arrow">▾</span></div><div class="filter-drop" data-drop="${id}" onclick="event.stopPropagation()">${dh}</div></div>`
  }

  let h=`<div class="page" style="display:flex;flex-direction:column;flex:1"><div class="page-head"><h1>流水明细</h1><div class="page-actions" style="display:flex;gap:8px">${ce?'<button class="btn btn-accent" onclick="showAdd()">＋ 新增</button>':''}<button class="btn btn-surface" onclick="exportXls()">⤓ 导出</button></div></div>
  <div class="filters-row">${mDrop('fp','项目','projects',ps)}${mDrop('fc','科目','categories',[],[{label:'收入',items:incC},{label:'支出',items:expC},{label:'退款',items:retC},...(othC.length?[{label:'其他',items:othC}]:[])])}${mDrop('fb','银行','banks',bs)}<input type="date" class="filter-input" style="width:130px" value="${G.filters.dateFrom}" onchange="G.filters.dateFrom=this.value;G.listPage=1;render()"><input type="date" class="filter-input" style="width:130px" value="${G.filters.dateTo}" onchange="G.filters.dateTo=this.value;G.listPage=1;render()"><input class="filter-input" style="width:180px" value="${esc(G.filters.search)}" oninput="G.filters.search=this.value;G.listPage=1;render()" placeholder="搜索对方/描述/编号...">${hf?'<button class="btn btn-ghost btn-sm" onclick="clearFilters()">✕ 清除</button>':''}</div>
  <div class="summary-bar"><span>共 <b style="color:var(--text)">${filtered.length}</b> 条</span><span>收入 <b style="color:var(--income)">¥${fmt(fI)}</b></span><span>支出 <b style="color:var(--expense)">¥${fmt(fE)}</b></span><span>净额 <b style="color:${fI-fE>=0?'var(--income)':'var(--danger)'}">¥${fmt(fI-fE)}</b></span></div>
  <div class="table-wrap"><table><thead><tr><th>序号</th><th>日期</th><th>来源银行</th><th>对方户名</th><th style="text-align:right">收入</th><th style="text-align:right">支出</th><th>项目</th><th>科目</th><th>描述</th><th>备注</th><th>飞书编号</th><th>操作</th></tr></thead><tbody>`;

  pg.forEach(r=>{
    if(G.editingId===r.id){
      h+=`<tr class="editing"><td>${r.id}</td><td><input type="date" class="edit-input" style="width:115px" value="${r.date}" id="e_date"></td><td><input class="edit-input" style="width:95px" value="${esc(r.bank)}" id="e_bank"></td><td><input class="edit-input" style="width:110px" value="${esc(r.counterparty)}" id="e_cpty"></td><td><input type="number" class="edit-input" style="width:85px" value="${r.income}" id="e_inc"></td><td><input type="number" class="edit-input" style="width:85px" value="${r.expense}" id="e_exp"></td><td><input class="edit-input" style="width:50px" value="${esc(r.project)}" id="e_proj"></td><td><input class="edit-input" style="width:85px" value="${esc(r.category)}" id="e_cat"></td><td><input class="edit-input" style="width:90px" value="${esc(r.description)}" id="e_desc"></td><td><input class="edit-input" style="width:90px" value="${esc(r.remark)}" id="e_rem"></td><td><input class="edit-input" style="width:90px" value="${esc(r.feishuId)}" id="e_fs"></td><td><button class="t-btn" style="color:var(--accent)" onclick="saveEdit(${r.id})">保存</button><button class="t-btn" style="color:var(--text-muted)" onclick="G.editingId=null;render()">取消</button></td></tr>`;
    } else {
      const tg=r.project==='C栋'?'tag-c':r.project==='D栋'?'tag-d':r.project?'tag-o':'';
      const hl=r.editLog&&r.editLog.length>0;
      h+=`<tr><td class="t-mono" style="color:var(--text-muted)">${r.id}</td><td class="t-mono">${r.date}</td><td class="t-trunc" title="${esc(r.bank)}">${esc(r.bank)}</td><td class="t-trunc" title="${esc(r.counterparty)}">${esc(r.counterparty)}</td><td class="t-mono t-inc">${r.income>0?fmt(r.income):''}</td><td class="t-mono t-exp">${r.expense>0?fmt(r.expense):''}</td><td>${r.project?`<span class="tag ${tg}">${esc(r.project)}</span>`:'-'}</td><td style="font-size:11px">${esc(r.category)}</td><td class="t-trunc" title="${esc(r.description)}">${esc(r.description)}</td><td class="t-trunc" title="${esc(r.remark)}">${esc(r.remark)}</td><td class="t-mono" style="color:var(--text-muted);font-size:10px">${esc(r.feishuId)}</td><td>${ce?`<button class="t-btn" style="color:var(--accent)" onclick="G.editingId=${r.id};render()">编辑</button>`:''}${cd?`<button class="t-btn" style="color:var(--danger)" onclick="delRec(${r.id})">删</button>`:''}${hl?`<button class="t-btn" style="color:var(--purple)" onclick="showLog(${r.id})">痕</button>`:''}</td></tr>`;
    }
  });
  h+=`</tbody></table>${!filtered.length?'<div class="empty" style="padding:30px"><div class="eico">◇</div>无匹配记录</div>':''}
  </div>`;
  if(tp>1) h+=`<div class="pagination"><button class="btn btn-ghost btn-sm" onclick="G.listPage=1;render()" ${G.listPage<=1?'disabled style="opacity:.3"':''}>⟨⟨</button><button class="btn btn-ghost btn-sm" onclick="G.listPage--;render()" ${G.listPage<=1?'disabled style="opacity:.3"':''}>‹ 上页</button><span>${G.listPage} / ${tp}</span><button class="btn btn-ghost btn-sm" onclick="G.listPage++;render()" ${G.listPage>=tp?'disabled style="opacity:.3"':''}>下页 ›</button><button class="btn btn-ghost btn-sm" onclick="G.listPage=${tp};render()" ${G.listPage>=tp?'disabled style="opacity:.3"':''}>⟩⟩</button></div>`;
  h+=`</div>`;
  $('main').innerHTML=h;
}

// ═══ PROJECTS ═══
function rProjects(){
  const ps=uniq('project');
  if(!ps.length){$('main').innerHTML=`<div class="page"><div class="page-head"><h1>项目分析</h1></div><div class="empty"><div class="eico">◫</div>暂无项目数据</div></div>`;return}
  if(!G.selectedProject||(!ps.includes(G.selectedProject)&&G.selectedProject!=='_all')) G.selectedProject=ps[0];
  let h=`<div class="page"><div class="page-head"><h1>项目分析</h1></div><div class="proj-select">${ps.map(p=>`<button class="proj-tab ${G.selectedProject===p?'active':''}" onclick="G.selectedProject='${esc(p)}';render()">${esc(p)}</button>`).join('')}<button class="proj-tab ${G.selectedProject==='_all'?'active':''}" onclick="G.selectedProject='_all';render()">全部对比</button></div>`;
  if(G.selectedProject==='_all') h+=rAllProj(ps); else h+=rOneProj(G.selectedProject);
  h+=`</div>`;$('main').innerHTML=h;
  setTimeout(()=>{if(G.selectedProject==='_all') rAllProjCharts(ps);else rOneProjCharts(G.selectedProject)},30);
}

function rOneProj(pn){
  const pr=G.records.filter(r=>r.project===pn),s=getStats(pr);
  const color=pn==='C栋'?'var(--income)':pn==='D栋'?'var(--blue)':'var(--purple)';
  const cats={};pr.forEach(r=>{const c=r.category||'未分类';if(!cats[c])cats[c]={name:c,income:0,expense:0,count:0};cats[c].income+=r.income;cats[c].expense+=r.expense;cats[c].count++});
  const ca=Object.values(cats).sort((a,b)=>(b.income+b.expense)-(a.income+a.expense));
  const cptys={};pr.forEach(r=>{if(!r.counterparty)return;if(!cptys[r.counterparty])cptys[r.counterparty]={name:r.counterparty,income:0,expense:0,count:0};cptys[r.counterparty].income+=r.income;cptys[r.counterparty].expense+=r.expense;cptys[r.counterparty].count++});
  const tc=Object.values(cptys).sort((a,b)=>(b.income+b.expense)-(a.income+a.expense)).slice(0,10);
  return`<div class="card proj-card"><div class="proj-head"><div><div class="proj-name"><span class="dot" style="background:${color}"></span>${esc(pn)}</div><div style="font-size:11px;color:var(--text-muted);margin-top:4px">${pr.length} 笔 · ${s.mArr.length} 个月</div></div><div class="proj-stats"><div class="proj-stat"><div class="ps-label">经营收入</div><div class="ps-val" style="color:var(--income)">¥${fmtW(s.totalInc)}</div></div><div class="proj-stat"><div class="ps-label">经营支出</div><div class="ps-val" style="color:var(--expense)">¥${fmtW(s.totalExp)}</div></div><div class="proj-stat"><div class="ps-label">经营利润</div><div class="ps-val" style="color:${s.balance>=0?'var(--income)':'var(--danger)'}">¥${fmtW(s.balance)}</div></div><div class="proj-stat"><div class="ps-label">借款净额</div><div class="ps-val" style="color:var(--blue)">¥${fmtW(s.borrowNet)}</div></div></div></div>
  <div class="proj-content"><div class="proj-section"><h4>月度收支趋势</h4><div style="height:220px"><canvas id="pc1"></canvas></div></div><div class="proj-section"><h4>收支科目分布</h4><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;height:220px"><canvas id="pc2"></canvas><canvas id="pc3"></canvas></div></div></div>
  <div class="proj-content" style="margin-top:18px"><div class="proj-section"><h4>科目明细</h4><div style="max-height:260px;overflow:auto"><table class="mini-table"><thead><tr><th>科目</th><th>收入</th><th>支出</th><th>笔数</th></tr></thead><tbody>${ca.map(c=>`<tr><td><span style="display:inline-block;width:6px;height:6px;border-radius:2px;margin-right:6px;background:${CC[c.name]||'#506580'}"></span>${esc(c.name)}</td><td class="t-mono" style="color:var(--income)">${c.income>0?fmt(c.income):'-'}</td><td class="t-mono" style="color:var(--expense)">${c.expense>0?fmt(c.expense):'-'}</td><td style="color:var(--text-muted)">${c.count}</td></tr>`).join('')}</tbody></table></div></div>
  <div class="proj-section"><h4>交易对手 TOP10</h4><div style="max-height:260px;overflow:auto"><table class="mini-table"><thead><tr><th>对方户名</th><th>收入</th><th>支出</th><th>笔</th></tr></thead><tbody>${tc.map(c=>`<tr><td class="t-trunc" style="max-width:140px" title="${esc(c.name)}">${esc(c.name)}</td><td class="t-mono" style="color:var(--income)">${c.income>0?fmt(c.income):'-'}</td><td class="t-mono" style="color:var(--expense)">${c.expense>0?fmt(c.expense):'-'}</td><td style="color:var(--text-muted)">${c.count}</td></tr>`).join('')}</tbody></table></div></div></div></div>`;
}

function rOneProjCharts(pn){
  const pr=G.records.filter(r=>r.project===pn);
  const mo={};pr.forEach(r=>{const m=r.date.slice(0,7);if(!mo[m])mo[m]={month:m,income:0,expense:0};mo[m].income+=r.income;mo[m].expense+=r.expense});
  const ma=Object.values(mo).sort((a,b)=>a.month.localeCompare(b.month));
  mkChart('pc1','bar',{labels:ma.map(m=>m.month),datasets:[{label:'收入',data:ma.map(m=>m.income),backgroundColor:'rgba(0,229,160,.7)',borderRadius:3,barPercentage:.6},{label:'支出',data:ma.map(m=>m.expense),backgroundColor:'rgba(240,160,48,.7)',borderRadius:3,barPercentage:.6}]});
  const ic={};pr.filter(r=>r.income>0).forEach(r=>{const c=r.category||'?';if(!ic[c])ic[c]={name:c,amount:0};ic[c].amount+=r.income});
  const ia=Object.values(ic).sort((a,b)=>b.amount-a.amount);
  if(ia.length) mkChart('pc2','doughnut',{labels:ia.map(c=>c.name),datasets:[{data:ia.map(c=>c.amount),backgroundColor:ia.map((c,i)=>CC[c.name]||COLORS[i%COLORS.length]),borderWidth:0}]},{cutout:'45%',plugins:{legend:{display:false},title:{display:true,text:'收入',color:'#506580',font:{size:11}}}});
  const ec={};pr.filter(r=>r.expense>0).forEach(r=>{const c=r.category||'?';if(!ec[c])ec[c]={name:c,amount:0};ec[c].amount+=r.expense});
  const ea=Object.values(ec).sort((a,b)=>b.amount-a.amount);
  if(ea.length) mkChart('pc3','doughnut',{labels:ea.map(c=>c.name),datasets:[{data:ea.map(c=>c.amount),backgroundColor:ea.map((c,i)=>CC[c.name]||COLORS[i%COLORS.length]),borderWidth:0}]},{cutout:'45%',plugins:{legend:{display:false},title:{display:true,text:'支出',color:'#506580',font:{size:11}}}});
}

function rAllProj(ps){
  let h=`<div class="card proj-card"><h3 style="font-size:15px;font-weight:600;margin-bottom:18px">全部项目对比</h3><div style="height:280px;margin-bottom:20px"><canvas id="pc_all"></canvas></div><div class="proj-content">`;
  ps.forEach((p,i)=>{const recs=G.records.filter(r=>r.project===p);const s=getStats(recs);const c=COLORS[i%COLORS.length];
    h+=`<div class="card" style="padding:16px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><span style="width:8px;height:8px;border-radius:3px;background:${c};display:inline-block"></span><b>${esc(p)}</b><span style="font-size:11px;color:var(--text-muted)">${recs.length}笔</span></div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;font-size:11px"><div><div style="color:var(--text-muted)">经营收入</div><div class="t-mono" style="color:var(--income);font-size:13px;font-weight:600">¥${fmtW(s.totalInc)}</div></div><div><div style="color:var(--text-muted)">经营支出</div><div class="t-mono" style="color:var(--expense);font-size:13px;font-weight:600">¥${fmtW(s.totalExp)}</div></div><div><div style="color:var(--text-muted)">利润</div><div class="t-mono" style="color:${s.balance>=0?'var(--income)':'var(--danger)'};font-size:13px;font-weight:600">¥${fmtW(s.balance)}</div></div></div></div>`});
  h+=`</div></div>`;return h;
}

function rAllProjCharts(ps){
  const am=new Set(),pd={};ps.forEach(p=>{pd[p]={}});
  G.records.forEach(r=>{if(!ps.includes(r.project))return;const m=r.date.slice(0,7);am.add(m);if(!pd[r.project][m])pd[r.project][m]={i:0,e:0};pd[r.project][m].i+=r.income;pd[r.project][m].e+=r.expense});
  const ms=[...am].sort(),ds=[];
  ps.forEach((p,i)=>{ds.push({label:`${p} 收入`,data:ms.map(m=>(pd[p][m]||{}).i||0),backgroundColor:`${COLORS[i*2%COLORS.length]}90`,borderRadius:2,stack:'s'+i});ds.push({label:`${p} 支出`,data:ms.map(m=>(pd[p][m]||{}).e||0),backgroundColor:`${COLORS[(i*2+1)%COLORS.length]}60`,borderRadius:2,stack:'s'+i})});
  mkChart('pc_all','bar',{labels:ms,datasets:ds},{scales:{x:{stacked:true,ticks:{color:'#506580',font:{size:9}},grid:{color:'rgba(30,48,80,.4)'}},y:{stacked:true,ticks:{color:'#506580',font:{size:9},callback:v=>fmtW(v)},grid:{color:'rgba(30,48,80,.4)'}}}});
}

// ═══ ACTIONS ═══
function saveEdit(id){const o=G.records.find(r=>r.id===id);const f={date:$('e_date').value,bank:$('e_bank').value,counterparty:$('e_cpty').value,income:parseFloat($('e_inc').value)||0,expense:parseFloat($('e_exp').value)||0,project:$('e_proj').value,category:$('e_cat').value,description:$('e_desc').value,remark:$('e_rem').value,feishuId:$('e_fs').value};const ch={};Object.keys(f).forEach(k=>{if(String(o[k])!==String(f[k]))ch[k]={from:o[k],to:f[k]}});Object.assign(o,f);o.editLog=(o.editLog||[]).concat({time:new Date().toISOString(),action:'修改',user:ROLES[G.role],changes:ch});G.editingId=null;save();render();toast('已更新（已留痕）')}
function delRec(id){if(!confirm('确认删除？'))return;G.records=G.records.filter(r=>r.id!==id);save();render();toast('已删除')}
function showLog(id){const r=G.records.find(r=>r.id===id);if(!r||!r.editLog?.length)return;$('modalBox').innerHTML=`<h2>记录 #${id} 修改历史<button onclick="closeModal()">✕</button></h2>${r.editLog.map(l=>`<div style="padding:10px;margin-bottom:6px;background:var(--bg);border-radius:var(--radius-sm);font-size:12px;border:1px solid var(--border)"><div style="color:var(--accent);margin-bottom:4px;font-size:11px">${(l.time||'').slice(0,19).replace('T',' ')} · ${l.action} · ${l.user}</div><div style="color:var(--text-dim);font-size:11px">${Object.entries(l.changes||{}).map(([k,v])=>`${k}: <span style="color:var(--danger)">${esc(v.from)}</span> → <span style="color:var(--income)">${esc(v.to)}</span>`).join('<br>')||'新增记录'}</div></div>`).join('')}`;$('modalBg').classList.remove('hidden')}
function showAdd(){const ps=uniq('project'),cs=uniq('category');$('modalBox').innerHTML=`<h2>新增流水<button onclick="closeModal()">✕</button></h2><div class="modal-grid"><div><div class="f-label">日期 *</div><input type="date" class="f-input" id="a_date"></div><div><div class="f-label">来源银行</div><input class="f-input" id="a_bank"></div><div><div class="f-label">对方户名</div><input class="f-input" id="a_cpty"></div><div><div class="f-label">项目</div><select class="f-input" id="a_proj"><option value="">选择</option>${ps.map(p=>`<option>${esc(p)}</option>`).join('')}</select></div><div><div class="f-label">收入</div><input type="number" class="f-input" id="a_inc" value="0"></div><div><div class="f-label">支出</div><input type="number" class="f-input" id="a_exp" value="0"></div><div><div class="f-label">科目</div><select class="f-input" id="a_cat"><option value="">选择</option>${cs.map(c=>`<option>${esc(c)}</option>`).join('')}</select></div><div><div class="f-label">飞书编号</div><input class="f-input" id="a_fs"></div><div class="full"><div class="f-label">描述</div><input class="f-input" id="a_desc"></div><div class="full"><div class="f-label">备注</div><input class="f-input" id="a_rem"></div></div><div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">取消</button><button class="btn btn-accent" onclick="confirmAdd()">确认</button></div>`;$('modalBg').classList.remove('hidden')}
function confirmAdd(){const d=$('a_date').value;if(!d){toast('请填日期');return}const nid=G.records.length?Math.max(...G.records.map(r=>r.id))+1:1;G.records.push({id:nid,date:d,bank:$('a_bank').value,counterparty:$('a_cpty').value,income:parseFloat($('a_inc').value)||0,expense:parseFloat($('a_exp').value)||0,project:$('a_proj').value,category:$('a_cat').value,description:$('a_desc').value,remark:$('a_rem').value,feishuId:$('a_fs').value,editLog:[{time:new Date().toISOString(),action:'新增',user:ROLES[G.role],changes:{}}]});save();closeModal();render();toast('已添加')}
function closeModal(){$('modalBg').classList.add('hidden')}
function handleImport(e){const f=e.target.files[0];if(!f)return;const reader=new FileReader();reader.onload=function(ev){try{const wb=XLSX.read(ev.target.result,{type:'array'});const ws=wb.Sheets[wb.SheetNames[0]];const rows=XLSX.utils.sheet_to_json(ws,{header:1});const sid=G.records.length?Math.max(...G.records.map(r=>r.id))+1:1;let cnt=0;rows.slice(1).forEach((row,i)=>{if(!row[1])return;let dv=row[1];if(typeof dv==='number'){const d=new Date((dv-25569)*86400000);dv=d.toISOString().slice(0,10)}else if(dv instanceof Date)dv=dv.toISOString().slice(0,10);G.records.push({id:sid+cnt,date:String(dv).slice(0,10),bank:String(row[2]||''),counterparty:String(row[3]||''),income:parseFloat(row[4])||0,expense:parseFloat(row[5])||0,project:String(row[6]||''),category:String(row[7]||''),description:String(row[8]||''),remark:String(row[10]||''),feishuId:String(row[11]||''),editLog:[]});cnt++});if(!cnt){toast('未找到有效数据');return}save();render();toast(`成功导入 ${cnt} 条`)}catch(err){toast('导入失败: '+err.message)}e.target.value=''};reader.readAsArrayBuffer(f)}
function exportXls(){const f=getFiltered();const d=[['序号','日期','来源银行','对方户名','借方（收入）','贷方（支出）','来源','科目','内容描述','备注','飞书流程编号']];f.forEach(r=>d.push([r.id,r.date,r.bank,r.counterparty,r.income,r.expense,r.project,r.category,r.description,r.remark,r.feishuId]));const ws=XLSX.utils.aoa_to_sheet(d);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'流水');XLSX.writeFile(wb,`财务内账_${new Date().toISOString().slice(0,10)}.xlsx`);toast('导出成功')}
function clearAll(){if(!confirm('确认清空？不可恢复！'))return;G.records=[];try{const m=localStorage.getItem(SK+'_m');if(m){const{n}=JSON.parse(m);for(let i=0;i<n;i++)localStorage.removeItem(SK+'_'+i);localStorage.removeItem(SK+'_m')}}catch(e){}render();toast('已清空')}

(async()=>{renderNav();setSyncStatus('syncing','加载中...');render();G.records=await load();renderNav();render();})();
</script>
