<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>财务内账系统</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg-deep:#eef3f8;--bg:#f5f7fb;--surface:#ffffff;--surface-hover:#f7fbff;--surface-alt:#f0f5fa;--border:#d8e3ef;--border-light:#c6d6e7;--text:#172335;--text-dim:#5c6f84;--text-muted:#8697ab;--accent:#0ea37d;--accent-dim:#0a8666;--accent-bg:rgba(14,163,125,.08);--accent-border:rgba(14,163,125,.22);--income:#0a9f6d;--expense:#d97706;--danger:#dc2626;--purple:#7c3aed;--blue:#2563eb;--radius:8px;--radius-sm:6px;--shadow:0 12px 36px rgba(17,34,68,.08);--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Noto Sans SC',-apple-system,sans-serif;background:linear-gradient(180deg,#f8fbff 0%,#eef4fb 100%);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#c7d5e4;border-radius:999px}
input,select,textarea,button{font-family:inherit}
.hidden{display:none!important}
.app{display:flex;height:100vh;height:100dvh;min-height:100vh}
.main{flex:1;overflow:auto;background:transparent;min-width:0;min-height:0}
.sidebar{width:208px;min-width:208px;background:linear-gradient(180deg,#09131f 0%,#0e1825 100%);border-right:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;transition:transform .3s;z-index:100;backdrop-filter:blur(16px)}
.sidebar-logo{padding:22px 18px 16px;border-bottom:1px solid rgba(255,255,255,.06)}
.sidebar-logo h1{font-size:16px;font-weight:700;color:#d9fff5;letter-spacing:1px;display:flex;align-items:center;gap:8px}
.sidebar-logo .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px rgba(14,163,125,.65)}
.sidebar-logo p{font-size:10px;color:rgba(217,255,245,.46);margin-top:5px;letter-spacing:1px}
nav{flex:1;padding:12px 8px}
.nav-btn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 14px;margin:2px 0;border:none;border-radius:var(--radius-sm);cursor:pointer;font-size:12px;background:transparent;color:#9ab0c6;transition:all .15s;letter-spacing:.4px;position:relative;overflow:hidden}
.nav-btn:hover{background:rgba(255,255,255,.04);color:#f4fbff}
.nav-btn.active{background:rgba(14,163,125,.12);color:#d9fff5;font-weight:600;border:1px solid rgba(14,163,125,.18)}
.nav-btn.active::before{content:'';position:absolute;left:0;top:20%;height:60%;width:2px;background:var(--accent);border-radius:2px}
.nav-btn .ico{font-size:14px;width:20px;text-align:center}
.sidebar-bottom{padding:14px;border-top:1px solid rgba(255,255,255,.06)}
.sidebar-user{display:grid;gap:10px}
.sidebar-user .name{font-size:13px;font-weight:600;color:#f4fbff}
.sidebar-user .meta{font-size:11px;color:#93a8bc;line-height:1.7}
.sidebar-user .role{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.06);font-size:11px;color:#d5e4f2;width:max-content}
.sidebar-status{padding:6px 14px 14px;font-size:10px;color:#93a8bc;letter-spacing:.5px;display:flex;align-items:center;gap:5px}
.page{padding:24px;animation:fadeIn .2s}
.page-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px;flex-wrap:wrap;gap:12px}
.page-head h1{font-size:clamp(22px,2vw,28px);font-weight:700;line-height:1.2}
.page-head .meta{font-size:12px;color:var(--text-muted);margin-top:6px}
.page-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:flex-end}
.btn{padding:8px 14px;border-radius:var(--radius-sm);border:1px solid transparent;color:var(--text);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit;display:inline-flex;align-items:center;justify-content:center;gap:6px;background:var(--surface)}
.btn:hover{transform:translateY(-1px)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn-accent{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-accent:hover{box-shadow:0 10px 26px rgba(14,163,125,.18)}
.btn-surface{background:var(--surface);border-color:var(--border);color:var(--text)}
.btn-ghost{background:transparent;border-color:var(--border);color:var(--text-dim)}
.btn-danger{background:#fff5f5;color:var(--danger);border-color:#fecaca}
.btn-sm{padding:5px 10px;font-size:11px}
.card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;transition:border-color .18s,transform .18s,box-shadow .18s;box-shadow:var(--shadow)}
.card:hover{border-color:var(--border-light);transform:translateY(-1px)}
.card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:24px}
.stat-card{padding:18px;position:relative;background:linear-gradient(180deg,#fff 0%,#fcfeff 100%)}
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.stat-card.t-inc::after{background:linear-gradient(90deg,var(--income),transparent)}
.stat-card.t-exp::after{background:linear-gradient(90deg,var(--expense),transparent)}
.stat-card.t-bal::after{background:linear-gradient(90deg,var(--accent),transparent)}
.stat-card.t-cnt::after{background:linear-gradient(90deg,var(--purple),transparent)}
.stat-card.t-bin::after{background:linear-gradient(90deg,var(--blue),transparent)}
.stat-card.t-bout::after{background:linear-gradient(90deg,#f97316,transparent)}
.stat-card .sc-label{font-size:12px;color:var(--text-muted);margin-bottom:10px;letter-spacing:.2px}
.stat-card .sc-val{font-size:clamp(20px,2vw,28px);font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1.2}
.stat-card .sc-sub{font-size:11px;color:var(--text-muted);margin-top:8px;line-height:1.6}
.chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:16px;margin-bottom:16px}
.chart-box{padding:18px}
.chart-box h3{font-size:14px;font-weight:700;margin-bottom:14px;color:var(--text)}
.chart-shell{display:grid;grid-template-columns:120px minmax(0,1fr);gap:14px;align-items:start}
.chart-side{display:grid;align-content:start;gap:8px;padding-top:2px}
.chart-side h3{margin:0;font-size:14px;font-weight:700;color:var(--text);line-height:1.45;word-break:break-word}
.chart-scroll{overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;padding-bottom:4px}
.chart-inner{position:relative;min-width:100%}
.chart-inner canvas{display:block;width:100%!important;height:100%!important}
.chart-scroll-hint{font-size:11px;color:var(--text-muted);line-height:1.6}
.chart-meta{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.chart-meta span,.data-pill{display:inline-flex;align-items:center;gap:6px;padding:7px 10px;border-radius:999px;background:var(--surface-alt);border:1px solid var(--border);font-size:11px;color:var(--text-dim)}
.data-pill strong{color:var(--text);font-weight:700}
.seg-toggle{display:inline-flex;align-items:center;padding:4px;background:var(--surface-alt);border:1px solid var(--border);border-radius:999px;gap:4px}
.seg-toggle button{padding:7px 14px;border:none;background:transparent;border-radius:999px;font-size:12px;font-weight:700;color:var(--text-dim);cursor:pointer}
.seg-toggle button.active{background:#fff;color:var(--text);box-shadow:0 3px 12px rgba(17,34,68,.08)}
.year-block{margin-bottom:18px}
.year-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.year-head h3{font-size:18px;font-weight:700}
.year-head .meta{margin-top:0}
.filters-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:flex-start}
.filter-wrap{position:relative}
.filter-trigger{padding:7px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;min-width:92px;transition:border-color .15s;white-space:nowrap}
.filter-trigger:hover,.filter-trigger.open{border-color:var(--accent-border)}
.filter-trigger .arrow{font-size:8px;color:var(--text-muted);margin-left:auto}
.filter-trigger .badge{background:var(--accent);color:#fff;font-size:9px;padding:1px 5px;border-radius:999px;font-weight:700;min-width:16px;text-align:center}
.filter-drop{position:absolute;top:calc(100% + 4px);left:0;min-width:220px;max-height:280px;overflow:auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);box-shadow:var(--shadow);z-index:50;display:none}
.filter-drop.show{display:block}
.fd-item{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;font-size:12px;color:var(--text-dim);transition:background .1s}
.fd-item:hover{background:var(--surface-hover)}
.fd-item.checked{color:var(--accent-dim)}
.fd-item .ck{width:14px;height:14px;border:1.5px solid var(--border-light);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;transition:all .15s}
.fd-item.checked .ck{background:var(--accent);border-color:var(--accent);color:#fff}
.fd-group{font-size:10px;color:var(--text-muted);padding:8px 12px 4px;letter-spacing:1px;text-transform:uppercase;border-top:1px solid var(--border)}
.fd-group:first-child{border-top:none}
.filter-input{padding:7px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:12px;transition:border-color .15s}
.filter-input:focus{outline:none;border-color:var(--accent-border)}
.summary-bar{display:flex;gap:12px;margin-bottom:10px;font-size:12px;color:var(--text-dim);padding:10px 12px;background:var(--surface);border-radius:var(--radius-sm);border:1px solid var(--border);flex-wrap:wrap}
.summary-bar span{display:inline-flex;align-items:center;gap:6px}
.summary-bar b{font-weight:700}
.table-wrap{flex:1;overflow:auto;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);-webkit-overflow-scrolling:touch;box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse;min-width:1100px}
thead{position:sticky;top:0;z-index:2}
thead th{padding:12px 9px;text-align:left;font-size:11px;font-weight:700;color:var(--text-muted);white-space:nowrap;background:var(--surface-alt);border-bottom:1px solid var(--border);letter-spacing:.4px}
tbody td{padding:9px 9px;font-size:12px;white-space:nowrap;border-bottom:1px solid rgba(216,227,239,.9)}
tbody tr{transition:background .1s}
tbody tr:hover{background:var(--surface-hover)}
.t-mono{font-family:'JetBrains Mono',monospace;font-size:11px}
.t-inc{color:var(--income);text-align:right}
.t-exp{color:var(--expense);text-align:right}
.t-trunc{max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tag{padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.3px}
.tag-c{background:rgba(10,159,109,.1);color:var(--income)}
.tag-d{background:rgba(37,99,235,.1);color:var(--blue)}
.tag-o{background:rgba(124,58,237,.1);color:var(--purple)}
.t-btn{padding:2px 6px;font-size:11px;border:none;cursor:pointer;background:transparent;border-radius:4px;color:var(--text-dim);font-family:inherit}
.t-btn:hover{background:var(--surface-alt)}
tr.editing{background:var(--accent-bg)!important}
.edit-input{padding:4px 6px;border-radius:4px;border:1px solid var(--border);background:#fff;color:var(--text);font-size:11px;font-family:inherit}
.pagination{display:flex;justify-content:center;align-items:center;gap:6px;margin-top:14px;flex-wrap:wrap}
.pagination span{font-size:11px;color:var(--text-muted)}
.modal-bg{position:fixed;inset:0;background:rgba(7,19,32,.44);display:flex;align-items:center;justify-content:center;z-index:1000;animation:fadeIn .15s;backdrop-filter:blur(4px)}
.modal{background:#fff;border-radius:12px;padding:24px;width:92%;max-width:560px;max-height:85vh;overflow:auto;border:1px solid var(--border);box-shadow:0 24px 60px rgba(17,34,68,.18);animation:slideUp .2s}
.modal h2{font-size:18px;font-weight:700;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center}
.modal h2 button{background:none;border:none;color:var(--text-muted);font-size:18px;cursor:pointer}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-grid .full{grid-column:1/-1}
.f-label{font-size:11px;color:var(--text-muted);margin-bottom:5px}
.f-input{width:100%;padding:8px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:#fff;color:var(--text);font-size:12px}
.f-input:focus{outline:none;border-color:var(--accent-border)}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}
.proj-toolbar{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:20px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);flex-wrap:wrap}
.proj-summary{display:grid;gap:4px;min-width:0}
.proj-summary .label{font-size:11px;color:var(--text-muted)}
.proj-summary .name{font-size:18px;font-weight:700;color:var(--text);line-height:1.2}
.proj-summary .meta{font-size:11px;color:var(--text-muted);margin-top:0}
.proj-select{display:grid;gap:6px;min-width:220px}
.proj-select label{font-size:11px;color:var(--text-muted)}
.proj-picker{min-width:220px;padding:10px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:#fff;color:var(--text);font-size:13px;font-weight:600;outline:none;transition:border-color .15s,box-shadow .15s}
.proj-picker:focus{border-color:var(--accent-border);box-shadow:0 0 0 3px rgba(14,163,125,.08)}
.proj-card{padding:24px}
.proj-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px;flex-wrap:wrap;gap:14px}
.proj-name{font-size:20px;font-weight:700;display:flex;align-items:center;gap:10px}
.proj-name .dot{width:10px;height:10px;border-radius:3px;display:inline-block}
.proj-stats{display:flex;gap:20px;flex-wrap:wrap}
.proj-stat{text-align:right}
.ps-label{font-size:10px;color:var(--text-muted);letter-spacing:.5px}
.ps-val{font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace;margin-top:2px}
.proj-content{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:18px}
.proj-section h4{font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px}
.mini-table{width:100%;border-collapse:collapse;min-width:0}
.mini-table th{padding:7px 8px;text-align:left;font-size:10px;color:var(--text-muted);border-bottom:1px solid var(--border);letter-spacing:.4px}
.mini-table td{padding:7px 8px;font-size:11px;border-bottom:1px solid rgba(216,227,239,.84)}
.s-card{max-width:780px;padding:22px;margin-bottom:16px}
.s-card h3{font-size:15px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.s-card .desc{font-size:12px;color:var(--text-dim);line-height:1.8}
.s-table{padding:6px 8px;font-size:12px;border-bottom:1px solid rgba(216,227,239,.84)}
.perm-row{display:flex;gap:12px;align-items:flex-start;padding:12px;border-radius:var(--radius-sm);background:var(--surface-alt);margin-bottom:8px;border:1px solid var(--border)}
.perm-badge{min-width:56px;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;text-align:center}
.empty{text-align:center;padding:60px 20px;color:var(--text-muted)}
.empty .eico{font-size:36px;margin-bottom:12px;opacity:.5}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:10px 22px;border-radius:999px;z-index:9999;font-size:13px;font-weight:700;box-shadow:0 10px 28px rgba(14,163,125,.25);animation:slideDown .25s}
.mobile-menu{display:none;position:fixed;top:calc(var(--safe-top) + 12px);left:12px;z-index:101;background:#fff;border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:12px;cursor:pointer;font-size:18px;line-height:1;box-shadow:var(--shadow)}
.sidebar-backdrop{display:none}
.sync-dot{display:inline-block;width:7px;height:7px;border-radius:50%;vertical-align:middle;flex-shrink:0}
.sync-dot.idle{background:var(--accent)}
.sync-dot.syncing{background:var(--blue);animation:syncPulse .8s infinite alternate}
.sync-dot.error{background:var(--danger)}
.sync-dot.offline{background:var(--text-muted)}
.cloud-row,.user-row{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.cloud-row .f-label,.user-row .f-label{font-size:11px;color:var(--text-muted);min-width:84px;flex-shrink:0}
.cloud-input,.user-input{flex:1;padding:8px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:#fff;color:var(--text);font-size:12px;min-width:0;font-family:inherit}
.cloud-input:focus,.user-input:focus{outline:none;border-color:var(--accent-border)}
.ledger-top{display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:flex-end}
.ledger-sync{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.top-note{padding:10px 12px;border:1px solid var(--border);background:var(--surface-alt);border-radius:var(--radius-sm);font-size:11px;color:var(--text-dim);line-height:1.7}
.top-note b{color:var(--text)}
.auth-shell{position:fixed;inset:0;background:linear-gradient(160deg,#eff6ff 0%,#f8fbff 45%,#eef7f5 100%);display:flex;align-items:center;justify-content:center;padding:20px;z-index:1200}
.auth-card{width:min(920px,100%);display:grid;grid-template-columns:minmax(260px,360px) minmax(320px,420px);background:rgba(255,255,255,.96);border:1px solid var(--border);border-radius:18px;overflow:hidden;box-shadow:0 28px 70px rgba(17,34,68,.14)}
.auth-side{padding:30px;background:linear-gradient(180deg,#0e1825 0%,#15253a 100%);color:#e8f4ff;display:flex;flex-direction:column;justify-content:space-between}
.auth-side h2{font-size:28px;font-weight:700;line-height:1.25}
.auth-side p{font-size:13px;color:rgba(232,244,255,.72);line-height:1.8;margin-top:12px}
.auth-side .mark{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:#d9fff5}
.auth-side .mark .dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.auth-side .meta{font-size:11px;color:rgba(232,244,255,.58);line-height:1.8}
.auth-main{padding:28px}
.auth-tabs{display:flex;gap:8px;margin-bottom:18px}
.auth-tab{flex:1;padding:10px 12px;border:1px solid var(--border);border-radius:10px;background:var(--surface-alt);cursor:pointer;font-size:13px;font-weight:700;color:var(--text-dim)}
.auth-tab.active{background:#fff;color:var(--text);box-shadow:0 4px 14px rgba(17,34,68,.08)}
.auth-form{display:grid;gap:12px}
.auth-form h3{font-size:22px;font-weight:700}
.auth-form .sub{font-size:12px;color:var(--text-muted);line-height:1.7}
.auth-form .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.auth-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.auth-tip{padding:10px 12px;border-radius:10px;background:var(--surface-alt);border:1px solid var(--border);font-size:11px;color:var(--text-dim);line-height:1.8}
.user-table-wrap{overflow:auto;border:1px solid var(--border);border-radius:var(--radius-sm);background:#fff}
.status-pill{display:inline-flex;align-items:center;padding:4px 8px;border-radius:999px;font-size:10px;font-weight:700}
.status-approved{background:rgba(10,159,109,.1);color:var(--income)}
.status-pending{background:rgba(217,119,6,.12);color:var(--expense)}
.status-rejected{background:rgba(220,38,38,.1);color:var(--danger)}
.amount-income{color:var(--income);font-weight:700}
.amount-expense{color:var(--expense);font-weight:700}
@media(max-width:920px){
  .auth-card{grid-template-columns:1fr}
  .auth-side{padding:24px}
}
@media(max-width:768px){
  body{font-size:14px}
  .sidebar-backdrop{display:block;position:fixed;inset:0;background:rgba(7,19,32,.42);backdrop-filter:blur(2px);z-index:99;opacity:0;pointer-events:none;transition:opacity .25s}
  .sidebar-backdrop.show{opacity:1;pointer-events:auto}

<div class="app" id="appShell">

<input type="file" id="fileInput" accept=".xlsx,.xls,.csv,.json" onchange="handleImport(event)" class="hidden">

<script>
const G={records:[],page:'dashboard',role:'viewer',filters:{projects:[],categories:[],banks:[],dateFrom:'',dateTo:'',search:''},listPage:1,editingId:null,selectedProject:null,dashboardMode:'all',charts:{},currentUser:null,authMode:'login',feishuWatcher:null,feishuBusy:false};
const PAGE_SIZE=20;
const ROLES={admin:'管理者',editor:'编辑者',viewer:'查看者'};
const COLORS=['#0ea37d','#2563eb','#d97706','#dc2626','#7c3aed','#db2777','#0f766e','#f97316','#4f46e5','#9333ea'];
const CC={'收入-工程款':'#0ea37d','收入-其他':'#34d399','支出-材料费':'#d97706','支出-劳务费':'#fb923c','支出-管理费':'#f97316','支出-税金':'#dc2626','支出-其他费':'#f87171','支出-利润提取':'#be123c','借款':'#7c3aed','往来-借款':'#2563eb','往来-备用金':'#4f46e5','退回备用金':'#6366f1','退回劳务款':'#8b5cf6','退回材料款':'#c084fc'};
const INCOME_CATS=['收入-工程款','收入-其他'];
const EXPENSE_CATS=['支出-材料费','支出-劳务费','支出-管理费','支出-税金','支出-其他费','支出-利润提取','借款','往来-借款','往来-备用金'];
const RETURN_CATS=['退回备用金','退回劳务款','退回材料款'];
const DEFAULT_ADMIN={id:'admin-seed',phone:'15914107989',name:'系统管理者',password:'gwjs1000',role:'admin',status:'approved',createdAt:'2026-04-14T00:00:00.000Z',approvedAt:'2026-04-14T00:00:00.000Z',approvedBy:'系统初始化'};

const $=id=>document.getElementById(id);
const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const enc=s=>encodeURIComponent(String(s==null?'':s));
const dec=s=>decodeURIComponent(String(s==null?'':s));
const fmt=n=>n!=null?Number(n).toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2}):'0.00';
const fmtW=n=>{const a=Math.abs(Number(n)||0);const v=Number(n)||0;return a>=1e8?(v/1e8).toFixed(2)+'亿':a>=1e4?(v/1e4).toFixed(2)+'万':fmt(v)};
const fmtWan=n=>((Number(n)||0)/1e4).toFixed(2)+'万';
const fmtDateTime=s=>{if(!s)return'未同步';const d=new Date(s);if(Number.isNaN(d.getTime()))return s;return d.toLocaleString('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})};
function toast(m){const t=$('toast');t.textContent=m;t.classList.remove('hidden');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.add('hidden'),2600)}

// ═══ Storage Keys ════════════════════════════════════════════════════════════
const SK='fin_v3';
const CLOUD_CFG_KEY='fin_cloud_cfg';
const AUTH_KEY='fin_auth_store_v1';
const SESSION_KEY='fin_auth_session_v1';
const FEISHU_CFG_KEY='fin_feishu_cfg_v1';
const FEISHU_META_KEY='fin_feishu_meta_v1';
const Sync={status:'idle',lastSyncAt:null,saveTimer:null,DEBOUNCE_MS:1500};

// ═══ Auth ════════════════════════════════════════════════════════════════════
function getAuthStore(){
  let store;
  try{store=JSON.parse(localStorage.getItem(AUTH_KEY)||'{"users":[]}')}catch(e){store={users:[]}}
  if(!Array.isArray(store.users))store.users=[];
  const hasAdmin=store.users.some(u=>u.phone===DEFAULT_ADMIN.phone);
  if(!hasAdmin){store.users.push({...DEFAULT_ADMIN});saveAuthStore(store)}
  return store;
}
function saveAuthStore(store){localStorage.setItem(AUTH_KEY,JSON.stringify(store))}
function getUsers(){return getAuthStore().users.slice().sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0))}
function getUserByPhone(phone){return getAuthStore().users.find(u=>u.phone===phone)}
function refreshSession(){
  const phone=localStorage.getItem(SESSION_KEY)||'';
  const user=phone?getUserByPhone(phone):null;
  if(user&&user.status==='approved'){G.currentUser={...user};G.role=user.role||'viewer';return}
  if(phone)localStorage.removeItem(SESSION_KEY);
  G.currentUser=null;G.role='viewer';
}
function login(){
  const phone=($('loginPhone')?.value||'').trim();
  const password=($('loginPassword')?.value||'').trim();
  const user=getUserByPhone(phone);
  if(!user||user.password!==password){toast('账号或密码不正确');return}
  if(user.status==='pending'){toast('账号待管理员审批');return}
  if(user.status==='rejected'){toast('该账号未通过审批');return}
  localStorage.setItem(SESSION_KEY,user.phone);
  refreshSession();
  render();
  toast('登录成功');
}
function registerUser(){
  const name=($('regName')?.value||'').trim();
  const phone=($('regPhone')?.value||'').trim();
  const password=($('regPassword')?.value||'').trim();
  const password2=($('regPassword2')?.value||'').trim();
  if(!name||!phone||!password){toast('请完整填写注册信息');return}
  if(!/^\d{11}$/.test(phone)){toast('手机号需为 11 位数字');return}
  if(password.length<6){toast('密码至少 6 位');return}
  if(password!==password2){toast('两次输入的密码不一致');return}
  const store=getAuthStore();
  const exists=store.users.find(u=>u.phone===phone);
  if(exists){toast(exists.status==='pending'?'该账号已提交申请':'该账号已存在');return}
  store.users.push({id:'u_'+Date.now(),phone,name,password,role:'viewer',status:'pending',createdAt:new Date().toISOString(),approvedAt:'',approvedBy:''});
  saveAuthStore(store);
  G.authMode='login';
  render();
  toast('注册申请已提交，等待管理员审批');
}
function logout(){
  localStorage.removeItem(SESSION_KEY);
  refreshSession();
  closeSidebar();
  render();
  toast('已退出登录');
}
function approveUser(id){
  if(G.role!=='admin')return;
  const store=getAuthStore();
  const user=store.users.find(u=>u.id===id);
  if(!user)return;
  user.status='approved';
  user.role=user.role||'viewer';
  user.approvedAt=new Date().toISOString();
  user.approvedBy=G.currentUser?.name||G.currentUser?.phone||'管理员';
  saveAuthStore(store);
  render();
  toast('已审批通过');
}
function rejectUser(id){
  if(G.role!=='admin')return;
  const store=getAuthStore();
  const user=store.users.find(u=>u.id===id);
  if(!user||user.phone===DEFAULT_ADMIN.phone)return;
  user.status='rejected';
  user.approvedAt=new Date().toISOString();
  user.approvedBy=G.currentUser?.name||G.currentUser?.phone||'管理员';
  saveAuthStore(store);
  if(localStorage.getItem(SESSION_KEY)===user.phone)localStorage.removeItem(SESSION_KEY);
  refreshSession();
  render();
  toast('已驳回申请');
}
function updateUserRole(id,value){
  if(G.role!=='admin')return;
  const store=getAuthStore();
  const user=store.users.find(u=>u.id===id);
  if(!user||user.status!=='approved')return;
  user.role=value;
  saveAuthStore(store);
  if(G.currentUser&&G.currentUser.id===id){G.currentUser={...user};G.role=user.role}
  render();
  toast('角色已更新');
}
function renderAuth(){
  $('appShell').classList.add('hidden');
  $('authShell').classList.remove('hidden');
  $('authShell').innerHTML=`<div class="auth-card">
    <div class="auth-side">
      <div>
        <div class="mark"><span class="dot"></span>财务内账系统</div>
        <h2>先登录，再进入账内世界。</h2>
        <p>支持注册申请，管理员审批通过后可登录使用。默认管理员账号已内置，可直接进入审批与配置。</p>
      </div>
      <div class="meta">默认管理员账号：${esc(DEFAULT_ADMIN.phone)}<br>默认管理员密码：${esc(DEFAULT_ADMIN.password)}</div>
    </div>
    <div class="auth-main">
      <div class="auth-tabs">
        <button class="auth-tab ${G.authMode==='login'?'active':''}" onclick="G.authMode='login';render()">登录</button>
        <button class="auth-tab ${G.authMode==='register'?'active':''}" onclick="G.authMode='register';render()">申请注册</button>
      </div>
      ${G.authMode==='login'
        ?`<div class="auth-form"><h3>账号登录</h3><div class="sub">输入手机号和密码后进入系统。</div>
          <input class="user-input" id="loginPhone" placeholder="手机号">
          <input class="user-input" id="loginPassword" type="password" placeholder="密码">
          <div class="auth-actions"><button class="btn btn-accent" onclick="login()">登录</button><button class="btn btn-ghost" onclick="G.authMode='register';render()">去注册</button></div>
          <div class="auth-tip">审批中的账号暂不能登录。管理员审批入口在“系统设置 > 账号审批”。</div>
        </div>`
        :`<div class="auth-form"><h3>提交注册申请</h3><div class="sub">注册后默认进入待审批状态，由管理员审核通过后开放登录。</div>
          <div class="grid"><input class="user-input" id="regName" placeholder="姓名"><input class="user-input" id="regPhone" placeholder="手机号"></div>
          <div class="grid"><input class="user-input" id="regPassword" type="password" placeholder="密码（至少 6 位）"><input class="user-input" id="regPassword2" type="password" placeholder="确认密码"></div>
          <div class="auth-actions"><button class="btn btn-accent" onclick="registerUser()">提交申请</button><button class="btn btn-ghost" onclick="G.authMode='login';render()">返回登录</button></div>
          <div class="auth-tip">审批通过后默认角色为查看者，管理员可在系统设置中调整为编辑者或管理者。</div>
        </div>`}
    </div>
  </div>`;
}

// ═══ Cloud Sync ══════════════════════════════════════════════════════════════
function getCloudCfg(){try{const r=localStorage.getItem(CLOUD_CFG_KEY);return r?JSON.parse(r):{endpoint:'',token:''}}catch(e){return{endpoint:'',token:''}}}
function saveCloudCfg(cfg){localStorage.setItem(CLOUD_CFG_KEY,JSON.stringify(cfg))}
function setSyncStatus(status,msg){
  Sync.status=status;
  const dot=$('syncDot'),txt=$('statusText');
  if(!dot||!txt)return;
  dot.className='sync-dot '+status;
  const base=G.records.length+' 条';
  txt.textContent=msg?base+' · '+msg:base;
}
function _serialize(){return JSON.stringify(G.records.map(r=>[r.id,r.date,r.bank,r.counterparty,r.income,r.expense,r.project,r.category,r.description,r.remark,r.feishuId,r.editLog||[]]))}
function _deserialize(s){return JSON.parse(s).map(a=>({id:a[0],date:a[1],bank:a[2],counterparty:a[3],income:a[4]||0,expense:a[5]||0,project:a[6]||'',category:a[7]||'',description:a[8]||'',remark:a[9]||'',feishuId:a[10]||'',editLog:a[11]||[]}))}
function _saveLocal(){try{const c=_serialize(),cs=2e6,n=Math.ceil(c.length/cs);localStorage.setItem(SK+'_m',JSON.stringify({n}));for(let i=0;i<n;i++)localStorage.setItem(SK+'_'+i,c.slice(i*cs,(i+1)*cs));for(let i=n;i<n+10;i++)localStorage.removeItem(SK+'_'+i)}catch(e){console.warn('localStorage write failed',e)}}
function _loadLocal(){try{const m=localStorage.getItem(SK+'_m');if(!m)return[];const{n}=JSON.parse(m);let s='';for(let i=0;i<n;i++)s+=localStorage.getItem(SK+'_'+i)||'';return _deserialize(s)}catch(e){return[]}}
async function _cloudGet(){const cfg=getCloudCfg();if(!cfg.endpoint||!cfg.token)return null;const r=await fetch(cfg.endpoint.replace(/\/$/,'')+'/records',{headers:{Authorization:'Bearer '+cfg.token},signal:AbortSignal.timeout(15000)});if(!r.ok)throw new Error('HTTP '+r.status);return await r.json()}
async function _cloudPut(payload){const cfg=getCloudCfg();if(!cfg.endpoint||!cfg.token)return false;const r=await fetch(cfg.endpoint.replace(/\/$/,'')+'/records',{method:'POST',headers:{Authorization:'Bearer '+cfg.token,'Content-Type':'application/json'},body:payload,signal:AbortSignal.timeout(20000)});if(!r.ok)throw new Error('HTTP '+r.status);return true}
function save(){
  _saveLocal();
  clearTimeout(Sync.saveTimer);
  const cfg=getCloudCfg();
  if(!cfg.endpoint||!cfg.token)return;
  setSyncStatus('syncing','待同步...');
  Sync.saveTimer=setTimeout(async()=>{
    try{
      setSyncStatus('syncing','同步中...');
      await _cloudPut(_serialize());
      Sync.lastSyncAt=new Date();
      setSyncStatus('idle','已同步 '+Sync.lastSyncAt.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}));
    }catch(e){
      console.warn('Cloud save failed:',e);
      setSyncStatus('error','同步失败');
    }
  },Sync.DEBOUNCE_MS);
}
async function load(){
  const cfg=getCloudCfg();
  if(!cfg.endpoint||!cfg.token)return _loadLocal();
  setSyncStatus('syncing','云端加载中...');
  try{
    const data=await _cloudGet();
    if(!data||data.length===0){
      const local=_loadLocal();
      if(local.length>0){setSyncStatus('offline','云端无数据，使用本地');return local}
      setSyncStatus('idle','');
      return [];
    }
    const records=_deserialize(JSON.stringify(data));
    G.records=records;
    _saveLocal();
    setSyncStatus('idle','云端已加载');
    return records;
  }catch(e){
    console.warn('Cloud load failed, using localStorage:',e);
    setSyncStatus('offline','离线模式');
    return _loadLocal();
  }
}
async function syncNow(){
  if(G.role!=='admin'){toast('仅管理者可执行云端同步');return}
  const cfg=getCloudCfg();
  if(!cfg.endpoint||!cfg.token){toast('请先配置云端设置');return}
  setSyncStatus('syncing','同步中...');
  try{
    await _cloudPut(_serialize());
    Sync.lastSyncAt=new Date();
    setSyncStatus('idle','已同步 '+Sync.lastSyncAt.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}));
    toast('同步成功');
  }catch(e){
    setSyncStatus('error','同步失败');
    toast('同步失败: '+e.message);
  }
}
async function loadFromCloud(){
  if(G.role!=='admin'){toast('仅管理者可从云端恢复');return}
  if(!confirm('从云端恢复将覆盖本地数据，确认吗？'))return;
  const cfg=getCloudCfg();
  if(!cfg.endpoint||!cfg.token){toast('请先配置云端设置');return}
  setSyncStatus('syncing','云端恢复中...');
  try{
    const data=await _cloudGet();
    if(!data||data.length===0){toast('云端暂无数据');setSyncStatus('idle','');return}
    G.records=_deserialize(JSON.stringify(data));
    _saveLocal();
    setSyncStatus('idle','云端已恢复');
    render();
    toast('已从云端恢复 '+G.records.length+' 条');
  }catch(e){
    setSyncStatus('error','恢复失败');
    toast('恢复失败: '+e.message);
  }
}

// ═══ Feishu Sync ═════════════════════════════════════════════════════════════
function getFeishuCfg(){try{const r=JSON.parse(localStorage.getItem(FEISHU_CFG_KEY)||'{}');return{url:r.url||'',autoEnabled:r.autoEnabled!==false,syncHour:Number.isFinite(Number(r.syncHour))?Number(r.syncHour):7}}catch(e){return{url:'',autoEnabled:true,syncHour:7}}}
function saveFeishuCfg(cfg){localStorage.setItem(FEISHU_CFG_KEY,JSON.stringify(cfg))}
function getFeishuMeta(){try{const r=JSON.parse(localStorage.getItem(FEISHU_META_KEY)||'{}');return{lastSyncAt:r.lastSyncAt||'',lastStatus:r.lastStatus||'idle',lastCount:r.lastCount||0,lastAdded:r.lastAdded||0,lastUpdated:r.lastUpdated||0,lastMessage:r.lastMessage||'尚未同步',lastError:r.lastError||'',lastSource:r.lastSource||'',lastMode:r.lastMode||''}}catch(e){return{lastSyncAt:'',lastStatus:'idle',lastCount:0,lastAdded:0,lastUpdated:0,lastMessage:'尚未同步',lastError:'',lastSource:'',lastMode:''}}}
function saveFeishuMeta(meta){localStorage.setItem(FEISHU_META_KEY,JSON.stringify(meta))}
function getNextAutoSyncText(){
  const cfg=getFeishuCfg();
  if(!cfg.autoEnabled||!cfg.url)return'未启用';
  const now=new Date();
  const next=new Date(now);
  next.setHours(cfg.syncHour||7,0,0,0);
  if(now>=next)next.setDate(next.getDate()+1);
  return next.toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
}
function shouldRunFeishuAutoSync(){
  const cfg=getFeishuCfg();
  if(!cfg.autoEnabled||!cfg.url)return false;
  const now=new Date();
  const todayTrigger=new Date(now);
  todayTrigger.setHours(cfg.syncHour||7,0,0,0);
  if(now<todayTrigger)return false;
  const meta=getFeishuMeta();
  if(!meta.lastSyncAt)return true;
  return new Date(meta.lastSyncAt)<todayTrigger;
}
function ensureFeishuWatcher(){
  clearInterval(G.feishuWatcher);
  if(!G.currentUser)return;
  G.feishuWatcher=setInterval(()=>{if(shouldRunFeishuAutoSync())syncFeishuFromUrl('auto')},60000);
  if(shouldRunFeishuAutoSync())syncFeishuFromUrl('auto');
}
function inferDirection(direction,category,amount){
  const dir=String(direction||'').trim();
  const cat=String(category||'').trim();
  if(/收入|借方|收款|退款/.test(dir))return amount<0?'expense':'income';
  if(/支出|贷方|付款|打款/.test(dir))return'expense';
  if(INCOME_CATS.includes(cat)||RETURN_CATS.includes(cat)||/^收入/.test(cat)||/^退回/.test(cat))return amount<0?'expense':'income';
  if(EXPENSE_CATS.includes(cat)||/^支出/.test(cat)||cat==='借款'||cat==='往来-借款'||cat==='往来-备用金')return'expense';
  return amount<0?'expense':'income';
}
function cleanText(v){return String(v==null?'':v).trim()}
function parseNumber(v){
  if(v==null||v==='')return 0;
  if(typeof v==='number')return Number.isFinite(v)?v:0;
  const s=String(v).replace(/[,，\s¥￥]/g,'').trim();
  const n=parseFloat(s);
  return Number.isFinite(n)?n:0;
}
function toISODate(v){
  if(v==null||v==='')return'';
  if(v instanceof Date&&!Number.isNaN(v.getTime()))return v.toISOString().slice(0,10);
  if(typeof v==='number'){
    const d=new Date((v-25569)*86400000);
    if(!Number.isNaN(d.getTime()))return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,10);
  }
  const s=String(v).trim();
  const m=s.match(/(\d{4})[\/.-](\d{1,2})[\/.-](\d{1,2})/);
  if(m)return`${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  const d=new Date(s);
  if(!Number.isNaN(d.getTime()))return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,10);
  return s.slice(0,10);
}
function normalizeRecord(r){
  return{id:r.id||0,date:toISODate(r.date),bank:cleanText(r.bank),counterparty:cleanText(r.counterparty),income:parseNumber(r.income),expense:parseNumber(r.expense),project:cleanText(r.project),category:cleanText(r.category),description:cleanText(r.description),remark:cleanText(r.remark),feishuId:cleanText(r.feishuId),editLog:Array.isArray(r.editLog)?r.editLog:[]};
}
function findHeaderRow(rows){
  for(let i=0;i<Math.min(rows.length,8);i++){
    const line=(rows[i]||[]).map(v=>cleanText(v)).join('|');
    if(/日期/.test(line)&&(/科目|费用|金额|借方|贷方|收入|支出/.test(line)))return i;
  }
  return 0;
}
function headerMap(headers){
  const norm=headers.map(h=>cleanText(h));
  const pick=(...keys)=>norm.findIndex(h=>keys.some(k=>h.includes(k)));
  return{
    date:pick('日期','付款日期','发生日期','支付日期'),
    bank:pick('来源银行','付款银行','银行'),
    counterparty:pick('对方户名','收款方','对方单位','收款单位','收款人'),
    income:pick('借方','收入'),
    expense:pick('贷方','支出'),
    amount:pick('金额','审批金额','付款金额'),
    direction:pick('收支类型','借贷方向','收支方向','付款类型'),
    project:pick('项目名称','来源','项目'),
    category:pick('费用类型','科目'),
    description:pick('费用说明','内容描述','描述','说明','内容'),
    remark:pick('备注'),
    feishuId:pick('审批编号','飞书流程编号','流程编号','飞书编号','审批单号')
  };
}
function rowsToRecords(rows){
  if(!rows||!rows.length)return[];
  const hi=findHeaderRow(rows);
  const headers=rows[hi]||[];
  const map=headerMap(headers);
  return rows.slice(hi+1).map(row=>{
    const date=map.date>-1?toISODate(row[map.date]):'';
    if(!date)return null;
    const category=map.category>-1?cleanText(row[map.category]):'';
    let income=map.income>-1?parseNumber(row[map.income]):0;
    let expense=map.expense>-1?parseNumber(row[map.expense]):0;
    const amount=map.amount>-1?parseNumber(row[map.amount]):0;
    if(!income&&!expense&&amount){
      const direction=map.direction>-1?cleanText(row[map.direction]):'';
      if(inferDirection(direction,category,amount)==='income')income=Math.abs(amount);else expense=Math.abs(amount);
    }
    return normalizeRecord({
      date,
      bank:map.bank>-1?row[map.bank]:'',
      counterparty:map.counterparty>-1?row[map.counterparty]:'',
      income,
      expense,
      project:map.project>-1?row[map.project]:'',
      category,
      description:map.description>-1?row[map.description]:'',
      remark:map.remark>-1?row[map.remark]:'',
      feishuId:map.feishuId>-1?row[map.feishuId]:''
    });
  }).filter(r=>r&&r.date&&(r.income||r.expense||r.category||r.counterparty||r.project));
}
function jsonToRecords(data){
  if(!Array.isArray(data))return[];
  if(data.length&&Array.isArray(data[0]))return rowsToRecords(data);
  return data.map(item=>normalizeRecord({
    date:item.date||item['日期']||item['付款日期'],
    bank:item.bank||item['来源银行']||item['付款银行'],
    counterparty:item.counterparty||item['对方户名']||item['收款方'],
    income:item.income??item['借方']??item['借方（收入）']??item['收入'],
    expense:item.expense??item['贷方']??item['贷方（支出）']??item['支出'],
    project:item.project||item['项目']||item['项目名称']||item['来源'],
    category:item.category||item['科目']||item['费用类型'],
    description:item.description||item['内容描述']||item['费用说明'],
    remark:item.remark||item['备注'],
    feishuId:item.feishuId||item['飞书流程编号']||item['审批编号']
  })).filter(r=>r.date);
}
function workbookToRecords(input,type){
  const wb=XLSX.read(input,{type});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:''});
  return rowsToRecords(rows);
}
function recordKey(r){
  if(r.feishuId)return'fs:'+r.feishuId;
  return[r.date,r.project,r.bank,r.counterparty,r.category,Number(r.income||0).toFixed(2),Number(r.expense||0).toFixed(2),r.description].join('|');
}
function mergeRecords(records,sourceName){
  const existing=new Map();
  G.records.forEach(r=>existing.set(recordKey(r),r));
  let nextId=G.records.length?Math.max(...G.records.map(r=>Number(r.id)||0))+1:1;
  let added=0,updated=0;
  records.forEach(raw=>{
    const rec=normalizeRecord(raw);
    const key=recordKey(rec);
    const target=existing.get(key)||(rec.feishuId?G.records.find(r=>r.feishuId===rec.feishuId):null);
    if(target){
      const changes={};
      ['date','bank','counterparty','income','expense','project','category','description','remark','feishuId'].forEach(k=>{if(String(target[k]??'')!==String(rec[k]??''))changes[k]={from:target[k],to:rec[k]}});
      if(Object.keys(changes).length){
        Object.assign(target,rec);
        target.editLog=(target.editLog||[]).concat({time:new Date().toISOString(),action:sourceName+'同步',user:'系统',changes});
        updated++;
      }
      return;
    }
    rec.id=nextId++;
    rec.editLog=(rec.editLog||[]).concat({time:new Date().toISOString(),action:sourceName+'导入',user:'系统',changes:{}});
    G.records.push(rec);
    existing.set(key,rec);
    added++;
  });
  return{added,updated,total:records.length};
}
async function importFile(file,sourceName){
  const lower=(file.name||'').toLowerCase();
  if(lower.endsWith('.json')){
    const text=await file.text();
    return jsonToRecords(JSON.parse(text));
  }
  if(lower.endsWith('.csv')){
    const text=await file.text();
    return workbookToRecords(text,'string');
  }
  const buf=await file.arrayBuffer();
  return workbookToRecords(buf,'array');
}

async function syncFeishuFromUrl(mode='manual'){
  const cloud=getCloudCfg();
  if(!cloud.endpoint||!cloud.token){$('feishuFileInput').click();return}
  if(G.feishuBusy)return;
  G.feishuBusy=true;
  saveFeishuMeta({...getFeishuMeta(),lastStatus:'syncing',lastMessage:mode==='auto'?'自动更新中...':'手动更新中...'});
  if(G.page==='ledger'||G.page==='settings')render();
  try{
    const base=cloud.endpoint.replace(/\/$/,'');
    const res=await fetch(base+'/feishu/sync',{method:'POST',headers:{Authorization:'Bearer '+cloud.token,'Content-Type':'application/json'},body:JSON.stringify({mode}),signal:AbortSignal.timeout(120000)});
    const result=await res.json();
    if(!res.ok)throw new Error(result.error||result.detail||'HTTP '+res.status);
    const dataRes=await fetch(base+'/records',{headers:{Authorization:'Bearer '+cloud.token},signal:AbortSignal.timeout(15000)});
    if(dataRes.ok){const data=await dataRes.json();G.records=_deserialize(JSON.stringify(data));_saveLocal()}
    saveFeishuMeta({...getFeishuMeta(),lastSyncAt:new Date().toISOString(),lastStatus:'idle',lastCount:result.total||0,lastAdded:result.added||0,lastUpdated:result.skipped||0,lastMessage:`新增 ${result.added||0}，已有 ${result.skipped||0} 条跳过`,lastError:'',lastMode:mode});
    render();
    toast(`飞书同步完成：新增 ${result.added||0} 条`);
  }catch(err){
    saveFeishuMeta({...getFeishuMeta(),lastStatus:'error',lastError:err.message,lastMessage:'同步失败'});
    render();
    toast('飞书同步失败: '+err.message);
  }finally{
    G.feishuBusy=false;
  }
}

  if(G.role==='viewer'){toast('查看者不能手动更新飞书数据');return}

function getStats(recs){
  const all=recs||G.records;
  let rawInc=0,rawExp=0,borrowIn=0,borrowOut=0,retLabor=0,retMat=0,retOther=0;
  const monthly={},byProj={},catInc={},catExp={};
  all.forEach(r=>{
    if(r.category==='往来-借款')borrowIn+=r.income;
    else if(r.category==='借款')borrowOut+=r.expense;
    if(r.category==='退回劳务款')retLabor+=r.income;
    if(r.category==='退回材料款')retMat+=r.income;
    if(r.category==='退回备用金')retOther+=r.income;
    rawInc+=r.income;
    rawExp+=r.expense;
    const m=(r.date||'').slice(0,7);
    if(m){
      if(!monthly[m])monthly[m]={month:m,income:0,expense:0};
      monthly[m].income+=r.income;
      monthly[m].expense+=r.expense;
    }
    const p=r.project||'未分类';
    if(!byProj[p])byProj[p]={name:p,income:0,expense:0,count:0};
    byProj[p].income+=r.income;
    byProj[p].expense+=r.expense;
    byProj[p].count++;
    if(r.income>0&&r.category){
      if(!catInc[r.category])catInc[r.category]={name:r.category,amount:0,count:0};
      catInc[r.category].amount+=r.income;
      catInc[r.category].count++;
    }
    if(r.expense>0&&r.category){
      if(!catExp[r.category])catExp[r.category]={name:r.category,amount:0,count:0};
      catExp[r.category].amount+=r.expense;
      catExp[r.category].count++;
    }
  });
  const totalInc=rawInc-borrowIn-(retLabor+retMat+retOther);
  const totalExp=rawExp-borrowOut;
  const mArr=Object.values(monthly).sort((a,b)=>a.month.localeCompare(b.month));
  let bal=0;
  mArr.forEach(m=>{bal+=m.income-m.expense;m.balance=bal});
  return{rawInc,rawExp,totalInc,totalExp,balance:totalInc-totalExp,borrowIn,borrowOut,borrowNet:borrowIn-borrowOut,retLabor,retMat,retOther,mArr,byProj:Object.values(byProj),catInc:Object.values(catInc).sort((a,b)=>b.amount-a.amount),catExp:Object.values(catExp).sort((a,b)=>b.amount-a.amount),total:all.length};
}
function getYearBuckets(){
  const map={};
  G.records.forEach(r=>{const y=(r.date||'').slice(0,4)||'未知';if(!map[y])map[y]=[];map[y].push(r)});
  return Object.keys(map).sort((a,b)=>b.localeCompare(a)).map(year=>({year,records:map[year],stats:getStats(map[year])}));

function rOneProj(pn){

  Object.values(cats).forEach(c=>{if(c.income>0)rows.push({name:c.name,amount:c.income,type:'收入',count:c.count,color:'amount-income'});if(c.expense>0)rows.push({name:c.name,amount:c.expense,type:'支出',count:c.count,color:'amount-expense'})});

    <div class="proj-content">
      <div class="proj-section">${scrollChartCard('月度收支趋势','pc1',220,s.mArr.length,{align:'end',metaHtml:`<div class="chart-scroll-hint">收入 ${fmtWan(s.totalInc)}<br>支出 ${fmtWan(s.totalExp)}</div>`})}</div>
      <div class="proj-section"><h4>经营支出分布饼状图</h4><div style="height:250px"><canvas id="pc2"></canvas></div></div>
    </div>
    <div class="proj-content" style="margin-top:18px">
      <div class="proj-section"><h4>科目明细</h4><div style="max-height:280px;overflow:auto"><table class="mini-table"><thead><tr><th>科目</th><th>金额</th><th>类型</th><th>笔数</th></tr></thead><tbody>${rows.map(c=>`<tr><td><span style="display:inline-block;width:6px;height:6px;border-radius:2px;margin-right:6px;background:${CC[c.name]||'#94a3b8'}"></span>${esc(c.name)}</td><td class="t-mono ${c.color}">${fmt(c.amount)}</td><td style="color:${c.type==='收入'?'var(--income)':'var(--expense)'}">${c.type}</td><td style="color:var(--text-muted)">${c.count}</td></tr>`).join('')}</tbody></table></div></div>
      <div class="proj-section"><h4>经营支出 TOP10</h4><div style="max-height:280px;overflow:auto"><table class="mini-table"><thead><tr><th>对方户名</th><th>支出金额</th><th>笔数</th></tr></thead><tbody>${expenseTop.map(c=>`<tr><td class="t-trunc" style="max-width:160px" title="${esc(c.name)}">${esc(c.name)}</td><td class="t-mono amount-expense">${fmt(c.expense)}</td><td style="color:var(--text-muted)">${c.count}</td></tr>`).join('')}</tbody></table></div></div>
    </div></div>`;
}
function rOneProjCharts(pn){
  const pr=G.records.filter(r=>r.project===pn);
  const mo={};
  pr.forEach(r=>{const m=(r.date||'').slice(0,7);if(!m)return;if(!mo[m])mo[m]={month:m,income:0,expense:0};mo[m].income+=r.income;mo[m].expense+=r.expense});
  const ma=Object.values(mo).sort((a,b)=>a.month.localeCompare(b.month));
  mkChart('pc1','bar',{labels:ma.map(m=>m.month),datasets:[{label:'收入',data:ma.map(m=>m.income),backgroundColor:'rgba(10,159,109,.78)',borderRadius:4,barPercentage:.58},{label:'支出',data:ma.map(m=>m.expense),backgroundColor:'rgba(217,119,6,.72)',borderRadius:4,barPercentage:.58}]});
  const ec={};
  pr.filter(r=>r.expense>0).forEach(r=>{const c=r.category||'未分类';if(!ec[c])ec[c]={name:c,amount:0};ec[c].amount+=r.expense});
  const ea=Object.values(ec).sort((a,b)=>b.amount-a.amount);
  if(ea.length)mkChart('pc2','doughnut',{labels:ea.map(c=>c.name),datasets:[{data:ea.map(c=>c.amount),backgroundColor:ea.map((c,i)=>CC[c.name]||COLORS[i%COLORS.length]),borderWidth:0}]},{cutout:'50%'});
  alignChartScrolls();
}
function rAllProj(ps){
  const monthCount=[...new Set(G.records.filter(r=>ps.includes(r.project)).map(r=>(r.date||'').slice(0,7)).filter(Boolean))].length;
  let h=`<div class="card proj-card">${scrollChartCard('全部项目对比','pc_all',280,monthCount,{align:'end'})}<div class="proj-content" style="margin-top:20px">`;
  ps.forEach((p,i)=>{const recs=G.records.filter(r=>r.project===p);const s=getStats(recs);const c=COLORS[i%COLORS.length];
    h+=`<div class="card" style="padding:16px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><span style="width:8px;height:8px;border-radius:3px;background:${c};display:inline-block"></span><b>${esc(p)}</b><span style="font-size:11px;color:var(--text-muted)">${recs.length} 笔</span></div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;font-size:11px"><div><div style="color:var(--text-muted)">经营收入</div><div class="t-mono" style="color:var(--income);font-size:13px;font-weight:700">¥${fmtW(s.totalInc)}</div></div><div><div style="color:var(--text-muted)">经营支出</div><div class="t-mono" style="color:var(--expense);font-size:13px;font-weight:700">¥${fmtW(s.totalExp)}</div></div><div><div style="color:var(--text-muted)">利润</div><div class="t-mono" style="color:${s.balance>=0?'var(--income)':'var(--danger)'};font-size:13px;font-weight:700">¥${fmtW(s.balance)}</div></div></div></div>`});
  h+=`</div></div>`;
  return h;
}
function rAllProjCharts(ps){
  const am=new Set(),pd={};ps.forEach(p=>{pd[p]={}});
  G.records.forEach(r=>{if(!ps.includes(r.project))return;const m=(r.date||'').slice(0,7);if(!m)return;am.add(m);if(!pd[r.project][m])pd[r.project][m]={i:0,e:0};pd[r.project][m].i+=r.income;pd[r.project][m].e+=r.expense});
  const ms=[...am].sort(),ds=[];
  ps.forEach((p,i)=>{ds.push({label:`${p} 收入`,data:ms.map(m=>(pd[p][m]||{}).i||0),backgroundColor:`${COLORS[i*2%COLORS.length]}c8`,borderRadius:3,stack:'s'+i});ds.push({label:`${p} 支出`,data:ms.map(m=>(pd[p][m]||{}).e||0),backgroundColor:`${COLORS[(i*2+1)%COLORS.length]}90`,borderRadius:3,stack:'s'+i})});
  mkChart('pc_all','bar',{labels:ms,datasets:ds},{scales:{x:{stacked:true},y:{stacked:true}}});
  alignChartScrolls();
}

// ═══ Settings ════════════════════════════════════════════════════════════════
function renderUserApprovalCard(){
  if(G.role!=='admin')return'';
  const users=getUsers();
  const pending=users.filter(u=>u.status==='pending');
  return`<div class="card s-card"><h3>◎ 账号审批</h3>
    <div class="desc" style="margin-bottom:12px">新注册账号会先进入待审批状态，由管理者审核通过后才可登录。</div>
    ${pending.length?pending.map(u=>`<div class="perm-row"><div style="flex:1"><div style="font-size:13px;font-weight:700;color:var(--text)">${esc(u.name||'未命名')}</div><div style="font-size:11px;color:var(--text-muted);line-height:1.8">${esc(u.phone)}<br>申请时间：${fmtDateTime(u.createdAt)}</div></div><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-accent btn-sm" onclick="approveUser('${esc(u.id)}')">批准</button><button class="btn btn-danger btn-sm" onclick="rejectUser('${esc(u.id)}')">驳回</button></div></div>`).join(''):'<div class="top-note">暂无待审批账号。</div>'}
    <div style="margin-top:16px" class="user-table-wrap"><table class="mini-table"><thead><tr><th>账号</th><th>姓名</th><th>状态</th><th>角色</th><th>审批</th></tr></thead><tbody>${users.map(u=>`<tr><td>${esc(u.phone)}</td><td>${esc(u.name||'-')}</td><td><span class="status-pill ${u.status==='approved'?'status-approved':u.status==='pending'?'status-pending':'status-rejected'}">${u.status==='approved'?'已通过':u.status==='pending'?'待审批':'已驳回'}</span></td><td>${u.status==='approved'?`<select class="f-input" style="min-width:112px;padding:5px 8px" onchange="updateUserRole('${esc(u.id)}',this.value)"><option value="viewer" ${u.role==='viewer'?'selected':''}>查看者</option><option value="editor" ${u.role==='editor'?'selected':''}>编辑者</option><option value="admin" ${u.role==='admin'?'selected':''}>管理者</option></select>`:'-'}</td><td style="color:var(--text-muted)">${u.approvedBy?esc(u.approvedBy):'-'}</td></tr>`).join('')}</tbody></table></div>
  </div>`;
}
function rSettings(){
  const isAdmin=G.role==='admin';
  const canSync=G.role!=='viewer';
  const mp=[['飞书审批字段','系统字段'],['审批编号','飞书流程编号'],['付款日期','日期'],['付款银行','来源银行'],['收款方','对方户名'],['金额','收入/支出'],['项目名称','项目'],['费用类型','科目'],['费用说明','内容描述'],['备注','备注']];
  const cfg=getCloudCfg();
  const feishuCfg=getFeishuCfg();
  const feishuMeta=getFeishuMeta();
  const syncLabel={idle:'就绪',syncing:'同步中',error:'同步失败',offline:'离线模式'}[Sync.status]||'就绪';
  const syncTime=Sync.lastSyncAt?'上次同步: '+Sync.lastSyncAt.toLocaleString('zh-CN'):'尚未同步';
  $('main').innerHTML=`<div class="page"><div class="page-head"><div><h1>系统设置</h1><div class="meta">数据导入、飞书同步、账号审批与权限配置</div></div></div>
    <div class="card s-card"><h3>☁ 云端存储配置</h3><div class="desc" style="margin-bottom:14px">配置阿里云函数计算 HTTP 地址和访问令牌，数据会自动备份到云端，支持多设备访问。配置仅保存在本地浏览器。</div>
      <div class="cloud-row"><span class="f-label">API 地址</span><input class="cloud-input" id="cfgEndpoint" type="url" placeholder="https://xxxxxx.cn-hangzhou.fcapp.run" value="${esc(cfg.endpoint)}"></div>
      <div class="cloud-row"><span class="f-label">访问令牌</span><input class="cloud-input" id="cfgToken" type="password" placeholder="与 FC 环境变量 ACCESS_TOKEN 一致" value="${esc(cfg.token)}"></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">${isAdmin?`<button class="btn btn-accent" onclick="saveCloudSettings()">保存配置</button><button class="btn btn-surface" onclick="syncNow()">⟳ 立即同步</button><button class="btn btn-ghost" onclick="loadFromCloud()">↓ 从云端恢复</button>`:'<span class="top-note">仅管理者可修改云端配置。</span>'}</div>
      <div style="font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:6px"><span class="sync-dot ${Sync.status}" style="width:7px;height:7px;flex-shrink:0"></span>${syncLabel} · ${syncTime}</div>
    </div>
    <div class="card s-card"><h3>◈ 数据导入</h3><div class="desc" style="margin-bottom:14px">支持 .xlsx / .csv / .json 文件。可导入标准台账，也可作为飞书导出文件的补充导入。</div><div style="display:flex;gap:10px;flex-wrap:wrap">${isAdmin?`<button class="btn btn-accent" onclick="$('fileInput').click()">选择文件导入</button>${G.records.length?'<button class="btn btn-danger" onclick="clearAll()">清空数据</button>':''}`:'<span class="top-note">仅管理者可导入或清空数据。</span>'}</div>${G.records.length?`<div style="margin-top:10px;font-size:11px;color:var(--text-muted)">当前已有 ${G.records.length} 条，重复数据会按飞书编号或关键字段自动合并。</div>`:''}</div>
    <div class=”card s-card”><h3>⟡ 飞书审批同步</h3><div class=”desc” style=”margin-bottom:12px”>支持两种方式：1）通过云端后端自动对接飞书审批API（需在FC环境变量配置飞书应用凭据），点击”立即同步”或每天 07:00 定时自动拉取；2）直接手动导入飞书导出的 Excel/CSV/JSON 文件。已配置云端存储时优先使用后端同步。</div>
      <div class="cloud-row"><span class="f-label">导出地址</span><input class="cloud-input" id="feishuUrl" type="url" placeholder="https://example.com/feishu-export.xlsx" value="${esc(feishuCfg.url)}"></div>
      <div class="cloud-row"><span class="f-label">自动更新</span><label style="font-size:12px;color:var(--text-dim);display:flex;align-items:center;gap:8px"><input id="feishuAuto" type="checkbox" ${feishuCfg.autoEnabled?'checked':''}> 每天 07:00 自动检查更新</label></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">${isAdmin?'<button class="btn btn-accent" onclick="saveFeishuSettings()">保存设置</button>':''}${canSync?'<button class="btn btn-surface" onclick="triggerFeishuUpdate()">⟳ 立即同步</button><button class="btn btn-ghost" onclick="$(\'feishuFileInput\').click()">导入飞书导出文件</button>':'<span class="top-note">查看者仅可查看同步状态，不能手动更新。</span>'}</div>
      <div class="top-note" style="margin-bottom:12px">最近同步：<b>${feishuMeta.lastSyncAt?fmtDateTime(feishuMeta.lastSyncAt):'未同步'}</b><br>同步结果：<b>${feishuMeta.lastMessage||'尚未同步'}</b>${feishuMeta.lastError?`<br>失败原因：${esc(feishuMeta.lastError)}`:''}<br>下次自动：<b>${getNextAutoSyncText()}</b></div>
      <div class="desc"><p style="margin-bottom:8px">建议导出字段映射：</p><table style="width:100%;border-collapse:collapse"><tbody>${mp.map(([a,b],i)=>`<tr><td class="s-table" style="font-weight:${i?400:700};color:${i?'var(--text-dim)':'var(--text)'}">${a}</td><td class="s-table" style="font-weight:${i?400:700};color:${i?'var(--accent-dim)':'var(--text)'}">${b}</td></tr>`).join('')}</tbody></table></div>
    </div>
    ${renderUserApprovalCard()}
    <div class="card s-card"><h3>◎ 当前账号</h3><div class="desc" style="margin-bottom:12px">已登录：${esc(G.currentUser.name||'-')}（${esc(G.currentUser.phone||'-')}）<br>角色：${ROLES[G.role]||'查看者'}</div><button class="btn btn-ghost" onclick="logout()">退出登录</button></div>
    <div class="card s-card"><h3>◎ 权限说明</h3>${[{r:'管理者',d:'全部权限：查看、新增、编辑、删除、导入导出、审批账号、配置同步',c:'var(--danger)'},{r:'编辑者',d:'查看、新增、编辑流水、导出、手动触发飞书更新',c:'var(--accent)'},{r:'查看者',d:'仅查看与导出，不能修改数据',c:'var(--text-muted)'}].map(p=>`<div class="perm-row"><span class="perm-badge" style="color:${p.c};background:${p.c}15">${p.r}</span><span style="font-size:11px;color:var(--text-dim);line-height:1.7">${p.d}</span></div>`).join('')}</div>
    <div class="card s-card"><h3>✎ 修改留痕</h3><div class="desc">所有编辑、导入、飞书同步都会记录时间与变更内容。流水表中的“痕”按钮可查看修改历史。</div></div>
    <div class="card s-card"><h3>◈ 统计口径</h3><div class="desc" style="line-height:2"><b style="color:var(--income)">经营收入</b> = 原始收入 − 往来-借款 − 退回劳务款 − 退回材料款 − 退回备用金<br><b style="color:var(--expense)">经营支出</b> = 原始支出 − 借款（归还）<br><b style="color:var(--blue)">借款</b>：往来-借款 与 借款（归还）单独统计</div></div>
  </div>`;
}
function saveCloudSettings(){
  if(G.role!=='admin'){toast('仅管理者可保存云端配置');return}
  const e=($('cfgEndpoint').value||'').trim(),t=($('cfgToken').value||'').trim();
  saveCloudCfg({endpoint:e,token:t});
  toast('云端配置已保存');
  render();
}

// ═══ Actions ═════════════════════════════════════════════════════════════════
function saveEdit(id){
  if(G.role==='viewer'){toast('查看者不能编辑流水');return}
  const o=G.records.find(r=>r.id===id);
  if(!o)return;
  const f={date:$('e_date').value,project:$('e_proj').value,bank:$('e_bank').value,counterparty:$('e_cpty').value,income:parseFloat($('e_inc').value)||0,expense:parseFloat($('e_exp').value)||0,category:$('e_cat').value,description:$('e_desc').value,remark:$('e_rem').value,feishuId:$('e_fs').value};
  const ch={};
  Object.keys(f).forEach(k=>{if(String(o[k])!==String(f[k]))ch[k]={from:o[k],to:f[k]}});
  Object.assign(o,f);
  o.editLog=(o.editLog||[]).concat({time:new Date().toISOString(),action:'修改',user:G.currentUser?.name||ROLES[G.role],changes:ch});
  G.editingId=null;
  save();
  render();
  toast('已更新（已留痕）');
}
function delRec(id){
  if(G.role!=='admin'){toast('仅管理者可删除流水');return}
  if(!confirm('确认删除？'))return;
  G.records=G.records.filter(r=>r.id!==id);
  save();
  render();
  toast('已删除');
}
function showLog(id){
  const r=G.records.find(x=>x.id===id);
  if(!r||!r.editLog?.length)return;
  $('modalBox').innerHTML=`<h2>记录 #${id} 修改历史<button onclick="closeModal()">✕</button></h2>${r.editLog.map(l=>`<div style="padding:10px;margin-bottom:8px;background:var(--surface-alt);border-radius:var(--radius-sm);font-size:12px;border:1px solid var(--border)"><div style="color:var(--accent-dim);margin-bottom:4px;font-size:11px">${fmtDateTime(l.time)} · ${esc(l.action)} · ${esc(l.user||'系统')}</div><div style="color:var(--text-dim);font-size:11px;line-height:1.7">${Object.entries(l.changes||{}).map(([k,v])=>`${esc(k)}: <span style="color:var(--danger)">${esc(v.from)}</span> → <span style="color:var(--income)">${esc(v.to)}</span>`).join('<br>')||'新增记录'}</div></div>`).join('')}`;
  $('modalBg').classList.remove('hidden');
}
function showAdd(){
  if(G.role==='viewer'){toast('查看者不能新增流水');return}
  const ps=uniq('project'),cs=uniq('category');
  $('modalBox').innerHTML=`<h2>新增流水<button onclick="closeModal()">✕</button></h2><div class="modal-grid"><div><div class="f-label">日期 *</div><input type="date" class="f-input" id="a_date" value="${new Date().toISOString().slice(0,10)}"></div><div><div class="f-label">项目</div><select class="f-input" id="a_proj"><option value="">选择</option>${ps.map(p=>`<option>${esc(p)}</option>`).join('')}</select></div><div><div class="f-label">来源银行</div><input class="f-input" id="a_bank"></div><div><div class="f-label">对方户名</div><input class="f-input" id="a_cpty"></div><div><div class="f-label">收入</div><input type="number" class="f-input" id="a_inc" value="0"></div><div><div class="f-label">支出</div><input type="number" class="f-input" id="a_exp" value="0"></div><div><div class="f-label">科目</div><select class="f-input" id="a_cat"><option value="">选择</option>${cs.map(c=>`<option>${esc(c)}</option>`).join('')}</select></div><div><div class="f-label">飞书编号</div><input class="f-input" id="a_fs"></div><div class="full"><div class="f-label">描述</div><input class="f-input" id="a_desc"></div><div class="full"><div class="f-label">备注</div><input class="f-input" id="a_rem"></div></div><div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">取消</button><button class="btn btn-accent" onclick="confirmAdd()">确认</button></div>`;
  $('modalBg').classList.remove('hidden');
}
function confirmAdd(){
  const d=$('a_date').value;
  if(!d){toast('请填日期');return}
  const nid=G.records.length?Math.max(...G.records.map(r=>Number(r.id)||0))+1:1;
  G.records.push({id:nid,date:d,project:$('a_proj').value,bank:$('a_bank').value,counterparty:$('a_cpty').value,income:parseFloat($('a_inc').value)||0,expense:parseFloat($('a_exp').value)||0,category:$('a_cat').value,description:$('a_desc').value,remark:$('a_rem').value,feishuId:$('a_fs').value,editLog:[{time:new Date().toISOString(),action:'新增',user:G.currentUser?.name||ROLES[G.role],changes:{}}]});
  save();
  closeModal();
  render();
  toast('已添加');
}
function closeModal(){$('modalBg').classList.add('hidden')}
function exportXls(){
  const f=getSortedRecords(getFiltered());
  const d=[['序号','日期','项目','来源银行','对方户名','借方（收入）','贷方（支出）','科目','内容描述','备注','飞书流程编号']];
  f.forEach((r,i)=>d.push([i+1,r.date,r.project,r.bank,r.counterparty,r.income,r.expense,r.category,r.description,r.remark,r.feishuId]));
  const ws=XLSX.utils.aoa_to_sheet(d);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'流水');
  XLSX.writeFile(wb,`财务内账_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('导出成功');
}
function clearAll(){
  if(G.role!=='admin'){toast('仅管理者可清空数据');return}
  if(!confirm('确认清空？不可恢复！'))return;
  G.records=[];
  try{
    const m=localStorage.getItem(SK+'_m');
    if(m){const{n}=JSON.parse(m);for(let i=0;i<n;i++)localStorage.removeItem(SK+'_'+i);localStorage.removeItem(SK+'_m')}
  }catch(e){}
  render();
  toast('已清空');
}

(async()=>{
  refreshSession();
  renderNav();
  renderSidebarBottom();
  setSyncStatus('syncing','加载中...');
  render();
  G.records=await load();
  renderNav();
  renderSidebarBottom();
  render();
})();
</script>
